<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>持仓与收益</title>
  <style>
    :root {
      --bg: #f7f8f4;
      --surface: #ffffff;
      --surface-soft: #f0f4ed;
      --surface-hover: #f6faf3;
      --text: #101511;
      --muted: #687066;
      --soft: #9aa29a;
      --line: #e3e9df;
      --line-strong: #ccd6c7;
      --good: #00c805;
      --good-dark: #008f2f;
      --danger: #ff5000;
      --shadow: 0 18px 44px rgba(22, 36, 25, 0.08);
      --card-radius: 8px;
      --pill-radius: 999px;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      overflow-x: hidden;
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Text",
        "Segoe UI",
        "PingFang SC",
        "Hiragino Sans GB",
        "Microsoft YaHei",
        sans-serif;
      font-variant-numeric: tabular-nums;
      text-rendering: geometricPrecision;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 0 max(28px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    .glass {
      width: 100%;
      min-height: min(900px, calc(100svh - 42px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .lock {
      min-height: min(760px, calc(100svh - 42px));
      display: grid;
      place-items: center;
      padding: 28px;
      background: linear-gradient(180deg, #ffffff, #f7faf4);
    }

    .lock-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      padding: 32px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 2.4rem;
      line-height: 1.08;
      font-weight: 780;
      letter-spacing: 0;
    }

    .input-row {
      margin-top: 26px;
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-width: 0;
      height: 48px;
      border: 1px solid var(--line);
      outline: none;
      border-radius: var(--pill-radius);
      padding: 0 16px;
      color: var(--text);
      background: var(--surface-soft);
      font-size: 16px;
      font-weight: 520;
      transition: border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    input:focus {
      border-color: var(--good);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 200, 5, 0.12);
    }

    input::placeholder {
      color: var(--soft);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      border-radius: var(--pill-radius);
      padding: 0 18px;
      color: #062208;
      background: var(--good);
      font-size: 15px;
      font-weight: 760;
      letter-spacing: 0;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 160ms var(--ease), background 160ms var(--ease), box-shadow 160ms var(--ease), opacity 160ms var(--ease);
    }

    button:hover {
      background: #00b905;
      box-shadow: 0 10px 24px rgba(0, 200, 5, 0.22);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0) scale(0.985);
    }

    button.secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      box-shadow: none;
    }

    button.secondary:hover {
      border-color: var(--line-strong);
      background: #eaf1e6;
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      min-height: 24px;
      margin-top: 14px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.55;
    }

    .dashboard {
      display: none;
      padding: 30px;
      background: var(--surface);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 20px;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: var(--pill-radius);
      color: var(--good-dark);
      background: rgba(0, 200, 5, 0.1);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--good);
    }

    .title-block h2 {
      margin-top: 10px;
      font-size: 2.65rem;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-top: 2px;
    }

    .tabs {
      position: sticky;
      top: max(10px, env(safe-area-inset-top));
      z-index: 5;
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(92px, 1fr));
      gap: 4px;
      min-height: 48px;
      padding: 4px;
      border-radius: var(--pill-radius);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      margin-bottom: 18px;
      isolation: isolate;
    }

    .tabs::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 4px;
      width: calc((100% - 16px) / 3);
      border-radius: var(--pill-radius);
      background: var(--surface);
      box-shadow: 0 4px 14px rgba(22, 36, 25, 0.1);
      transform: translateX(0);
      transition: transform 260ms var(--ease);
      pointer-events: none;
      z-index: 0;
    }

    .tabs[data-active="performance"]::before {
      transform: translateX(calc(100% + 4px));
    }

    .tabs[data-active="trading"]::before {
      transform: translateX(calc((100% + 4px) * 2));
    }

    .tab {
      min-height: 38px;
      color: var(--muted);
      border: 0;
      border-radius: var(--pill-radius);
      padding: 0 18px;
      background: transparent;
      box-shadow: none;
      font-weight: 740;
      transition: color 180ms var(--ease), transform 180ms var(--ease);
      position: relative;
      z-index: 1;
    }

    .tab:hover {
      transform: none;
      box-shadow: none;
      color: var(--text);
      background: transparent;
    }

    .tab.active {
      color: var(--text);
    }

    .panel {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    }

    .panel.active {
      display: block;
    }

    .panel.active.panel-ready {
      opacity: 1;
      transform: translateY(0);
    }

    .main-grid,
    .performance-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 0.86fr);
      gap: 18px;
      align-items: stretch;
    }

    .trading-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(300px, 0.48fr);
      gap: 18px;
      align-items: start;
      min-width: 0;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .chart-card,
    .list-card,
    .metric-card,
    .perf-card,
    .trade-side-card,
    .ranking-card,
    .summary-item {
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--surface);
      min-width: 0;
    }

    .chart-card {
      min-height: 610px;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 20px;
    }

    .chart-wrap {
      min-height: 470px;
      width: 100%;
      min-width: 0;
      display: grid;
      place-items: center;
    }

    .trade-chart-card {
      min-height: 640px;
      grid-template-rows: auto 1fr auto;
    }

    .trade-chart-wrap {
      min-height: 520px;
      place-items: stretch;
      overflow: hidden;
    }

    svg {
      width: min(100%, 500px);
      max-width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    svg.trade-chart {
      width: 100%;
      min-width: 0;
      max-width: none;
      align-self: auto;
      overflow: hidden;
    }

    .slice-group {
      cursor: pointer;
      transform-origin: 180px 180px;
      transition: transform 240ms var(--ease), opacity 180ms var(--ease), filter 180ms var(--ease);
    }

    .slice-group:hover,
    .slice-group.active {
      transform: scale(1.014);
      filter: drop-shadow(0 8px 14px rgba(21, 34, 22, 0.12)) saturate(1.08);
      opacity: 1;
    }

    .slice-group.dim {
      opacity: 0.68;
    }

    .center-copy {
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 140ms var(--ease), transform 180ms var(--ease);
    }

    svg.center-changing .center-copy {
      opacity: 0;
      transform: translateY(4px);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .summary-strip.holdings-summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .summary-item {
      min-width: 0;
      padding: 14px;
      background: var(--surface-soft);
    }

    .metric-label,
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .summary-value {
      margin-top: 7px;
      font-size: 1.05rem;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .list-card,
    .perf-card,
    .trade-side-card,
    .ranking-card {
      padding: 16px;
    }

    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 2px 2px 14px;
      gap: 14px;
    }

    .list-head strong {
      font-size: 1.12rem;
      font-weight: 760;
      letter-spacing: 0;
    }

    .list-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .holding-list,
    .perf-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .holding,
    .perf-row,
    .rank-row {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: var(--card-radius);
      background: var(--surface);
      cursor: pointer;
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    .holding::before,
    .perf-row::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 3px;
      border-radius: 0 999px 999px 0;
      background: var(--accent, var(--good));
      opacity: 0;
      transform: scaleY(0.4);
      transform-origin: center;
      transition: opacity 180ms var(--ease), transform 220ms var(--ease);
    }

    .holding > *,
    .perf-row > * {
      position: relative;
    }

    .holding {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
    }

    .holding:hover,
    .holding.active,
    .perf-row.active,
    .perf-row:hover,
    .rank-row:hover {
      transform: translateY(-1px);
      border-color: var(--line);
      background: var(--surface-hover);
      box-shadow: 0 8px 20px rgba(22, 36, 25, 0.06);
    }

    .holding.active,
    .perf-row.active {
      border-color: rgba(0, 200, 5, 0.2);
      background: linear-gradient(90deg, var(--accent-soft, rgba(0, 200, 5, 0.08)), #ffffff 44%);
    }

    .holding:hover::before,
    .holding.active::before,
    .perf-row:hover::before,
    .perf-row.active::before {
      opacity: 1;
      transform: scaleY(1);
    }

    .swatch {
      width: 8px;
      height: 34px;
      border-radius: var(--pill-radius);
      box-shadow: inset 0 0 0 1px rgba(16, 21, 17, 0.1);
    }

    .holding-main,
    .rank-main {
      min-width: 0;
    }

    .ticker-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .ticker,
    .perf-name,
    .rank-title {
      font-weight: 760;
      letter-spacing: 0;
    }

    .ticker {
      font-size: 1rem;
    }

    .kind {
      color: var(--muted);
      font-size: 12px;
      padding: 3px 8px;
      border-radius: var(--pill-radius);
      background: var(--surface-soft);
      white-space: nowrap;
    }

    .zh {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .holding-side {
      text-align: right;
      min-width: max-content;
    }

    .pct {
      font-size: 0.98rem;
      font-weight: 760;
      letter-spacing: 0;
    }

    .val {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .metric-card {
      min-height: 126px;
      padding: 18px;
    }

    .metric-card.primary {
      background: #eefbea;
      border-color: rgba(0, 200, 5, 0.22);
    }

    .metric-value {
      margin-top: 12px;
      font-size: 1.9rem;
      font-weight: 780;
      letter-spacing: 0;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .metric-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .perf-row {
      padding: 14px;
    }

    .perf-row-top,
    .perf-row-bottom {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
    }

    .perf-name {
      font-size: 1rem;
      min-width: 0;
    }

    .gain {
      color: var(--good-dark);
      font-weight: 780;
      letter-spacing: 0;
    }

    .gain.negative {
      color: var(--danger);
    }

    .perf-row-bottom {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .bar-track {
      height: 8px;
      border-radius: var(--pill-radius);
      margin-top: 12px;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: var(--pill-radius);
      background: var(--accent, var(--good));
      min-width: 4px;
      transition: width 260ms var(--ease), background 180ms var(--ease);
    }

    .bar-fill.negative {
      background: var(--danger);
    }

    .ticker-selector,
    .trade-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ticker-selector {
      margin-bottom: 16px;
    }

    .ticker-chip,
    .trade-row {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: var(--card-radius);
      background: var(--surface);
      cursor: pointer;
      padding: 12px;
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    .ticker-chip::before,
    .trade-row::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 3px;
      border-radius: 0 999px 999px 0;
      background: var(--accent, var(--good));
      opacity: 0;
      transform: scaleY(0.4);
      transform-origin: center;
      transition: opacity 180ms var(--ease), transform 220ms var(--ease);
    }

    .ticker-chip > *,
    .trade-row > * {
      position: relative;
    }

    .ticker-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .trade-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .ticker-chip:hover,
    .ticker-chip.active,
    .trade-row:hover,
    .trade-row.active {
      transform: translateY(-1px);
      border-color: var(--line);
      background: var(--surface-hover);
      box-shadow: 0 8px 20px rgba(22, 36, 25, 0.06);
    }

    .ticker-chip.active,
    .trade-row.active {
      border-color: rgba(0, 200, 5, 0.2);
      background: linear-gradient(90deg, var(--accent-soft, rgba(0, 200, 5, 0.08)), #ffffff 44%);
    }

    .ticker-chip:hover::before,
    .ticker-chip.active::before,
    .trade-row:hover::before,
    .trade-row.active::before {
      opacity: 1;
      transform: scaleY(1);
    }

    .ticker-chip-main,
    .trade-main {
      min-width: 0;
    }

    .ticker-chip-sub,
    .trade-meta,
    .trade-detail-text {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .ticker-chip-sub {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ticker-chip-return {
      color: var(--good-dark);
      font-size: 13px;
      font-weight: 760;
      white-space: nowrap;
    }

    .ticker-chip-return.negative {
      color: var(--danger);
    }

    .trade-side {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 26px;
      border-radius: var(--pill-radius);
      font-size: 12px;
      font-weight: 760;
      color: #062208;
      background: rgba(0, 200, 5, 0.16);
    }

    .trade-side.sell {
      color: #4d1700;
      background: rgba(255, 80, 0, 0.14);
    }

    .trade-price {
      font-weight: 760;
      text-align: right;
      white-space: nowrap;
    }

    .trade-detail {
      margin-top: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--surface-soft);
    }

    @media (min-width: 1081px) {
      .trade-chart-card {
        position: sticky;
        top: 18px;
        align-self: start;
      }

      .trade-chart-wrap {
        min-height: clamp(430px, calc(100vh - 280px), 520px);
      }

      .trade-side-card {
        display: flex;
        flex-direction: column;
        max-height: min(820px, calc(100vh - 118px));
        min-height: 0;
        overflow: hidden;
      }

      .trade-side-card .list-head,
      .ticker-selector,
      .trade-detail {
        flex: 0 0 auto;
      }

      .trade-list {
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding-right: 4px;
        margin-right: -4px;
      }
    }

    .trade-detail-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .trade-detail-title {
      font-weight: 780;
    }

    .trade-detail-side {
      color: var(--good-dark);
      font-size: 13px;
      font-weight: 760;
    }

    .trade-detail-side.sell {
      color: var(--danger);
    }

    .price-path {
      fill: none;
      stroke: var(--good);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .price-area {
      fill: rgba(0, 200, 5, 0.08);
    }

    .axis-line,
    .grid-line {
      stroke: var(--line);
      stroke-width: 1;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 620;
    }

    .trade-marker {
      cursor: pointer;
      transition: opacity 160ms var(--ease), filter 160ms var(--ease);
    }

    .marker-dot {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 180ms var(--ease);
    }

    .trade-marker:hover .marker-dot,
    .trade-marker.active .marker-dot {
      transform: scale(1.14);
    }

    .trade-marker:hover,
    .trade-marker.active {
      filter: drop-shadow(0 8px 14px rgba(22, 36, 25, 0.16));
    }

    .trade-marker.dim {
      opacity: 0.45;
    }

    .marker-label {
      fill: #fff;
      font-size: 11px;
      font-weight: 860;
      pointer-events: none;
    }

    .chart-callout {
      fill: #101511;
    }

    .chart-callout-text {
      fill: #fff;
      font-size: 12px;
      font-weight: 720;
      pointer-events: none;
    }

    .empty-note {
      padding: 18px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--surface-soft);
      font-size: 13px;
      line-height: 1.5;
    }

    .ranking-card {
      margin-top: 18px;

      *,
      *::before,

</head>

  </main>

  <div id="toast" class="toast"></div>

  <script>
    const EMBEDDED_DATA = null;
    const PREVIEW_MODE = false;

    const state = {
      password: "",
      data: null,
      marketPrices: null,
      selectedHolding: 0,
      selectedPerformance: 0,
      selectedTradingTicker: "",
      selectedTrade: 0,
      activeTab: "trading",
      colors: [
        "#00c805",
        "#00a76f",
        "#2f80ed",
        "#f2c94c",
        "#ff5000",
        "#6d5dfc",
        "#00b8d9",
        "#8dc63f",
        "#f2994a",
        "#242a24"
      ]
    };

    const $ = (id) => document.getElementById(id);

    function setButtonLabel(id, text) {
      $(id).textContent = text;
    }

    const formatCurrency = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value || 0);
    };

    const formatCurrencyFull = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(value || 0);
    };

    const formatPct = (value) => `${(value || 0).toFixed(1)}%`;

    const formatSignedCurrency = (value) => {
      const abs = formatCurrency(Math.abs(value || 0));
      return `${value >= 0 ? "+" : "-"}${abs}`;
    };

    const formatSignedPct = (value) => `${value >= 0 ? "+" : ""}${(value || 0).toFixed(1)}%`;

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function base64ToBytes(base64) {
      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations,
          hash: "SHA-256"
        },
        material,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );
    }

    async function decryptPayload(encrypted, password) {
      const salt = base64ToBytes(encrypted.salt);
      const iv = base64ToBytes(encrypted.iv);
      const ciphertext = base64ToBytes(encrypted.ciphertext);
      const key = await deriveKey(password, salt, encrypted.iterations || 250000);

      const plaintext = await crypto.subtle.decrypt(
        {
          name: "AES-GCM",
          iv
        },
        key,
        ciphertext
      );

      const text = new TextDecoder().decode(plaintext);
      return JSON.parse(text);
    }

    async function fetchEncrypted() {
      const response = await fetch(`./data.enc.json?ts=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("无法读取 data.enc.json");
      }

      return response.json();
    }

    async function fetchPublicMarketPrices() {
      try {
        const response = await fetch(`./market.prices.json?ts=${Date.now()}`, {
          cache: "no-store"
        });
        if (!response.ok) return null;
        return response.json();
      } catch (err) {
        return null;
      }
    }

    async function unlock() {
      const password = $("passwordInput").value.trim();
      const error = $("lockError");
      error.textContent = "";

      if (!password) {
        error.textContent = "请输入访问密码。";
        return;
      }

      $("unlockBtn").disabled = true;
      setButtonLabel("unlockBtn", "解密中");

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, password);
        state.password = password;
        activateData(data);
        showToast("已解锁");
      } catch (err) {
        error.textContent = "密码错误，或数据文件不可用。";
      } finally {
        $("unlockBtn").disabled = false;
        setButtonLabel("unlockBtn", "解锁");
      }
    }

    function activateData(data) {
      state.data = normalizeData(data);
      state.marketPrices = null;
      state.selectedHolding = 0;
      state.selectedPerformance = 0;
      state.selectedTradingTicker = state.data.trading[0]?.ticker || "";
      state.selectedTrade = 0;

      $("lock").style.display = "none";
      $("dashboard").style.display = "block";
      render();
      hydratePublicMarketPrices();
    }

    function normalizeData(data) {
      const holdings = [...data.holdings]
        .filter((item) => Number(item.value) > 0)
        .sort((a, b) => b.value - a.value);

      const total = holdings.reduce((sum, item) => sum + Number(item.value), 0);

      holdings.forEach((item) => {
        item.weight = Number(item.value) / total * 100;
      });

      const trading = normalizeTradingData(data.trading, holdings, data.asOf);

      return {
        ...data,
        equityValue: total,
        holdings,
        trading
      };
    }

    function isTradableHolding(item) {
      const type = String(item.type || "").toLowerCase();
      const ticker = String(item.ticker || "").toUpperCase();
      return ticker && ticker !== "CD" && !type.includes("现金") && !type.includes("cash") && !type.includes("cd");
    }

    function stableHash(text) {
      return String(text || "").split("").reduce((hash, char) => {
        return (hash * 31 + char.charCodeAt(0)) % 9973;
      }, 17);
    }

    function previewTradingDates(asOf) {
      const end = asOf ? new Date(`${asOf}T00:00:00`) : new Date("2026-06-18T00:00:00");
      if (Number.isNaN(end.getTime())) end.setTime(new Date("2026-06-18T00:00:00").getTime());
      return Array.from({ length: 22 }, (_, index) => {
        const date = new Date(end);
        date.setDate(date.getDate() - (21 - index) * 7);
        return date.toISOString().slice(0, 10);
      });
    }

    function generatePreviewTradingForHolding(item, index, asOf) {
      const hash = stableHash(item.ticker);
      const dates = previewTradingDates(asOf);
      const start = 42 + hash % 280 + index * 7;
      const trend = ((hash % 9) - 2) * 0.48;
      const prices = dates.map((date, pointIndex) => {
        const wave = Math.sin((pointIndex + hash % 6) * 0.74) * (2.8 + index * 0.35);
        const pulse = Math.cos((pointIndex + 2) * 0.37 + hash % 5) * 1.8;
        const close = Math.max(8, start + pointIndex * trend + wave + pulse);
        return { date, close: Number(close.toFixed(2)) };
      });
      const orderIndexes = [2, 6, 10, 14, 18].filter((orderIndex) => orderIndex < prices.length);
      const orders = orderIndexes.map((orderIndex, orderNumber) => ({
        date: prices[orderIndex].date,
        side: orderNumber === 2 || orderNumber === 4 ? "sell" : "buy",
        shares: 2 + (hash + orderNumber + index) % 9,
        price: prices[orderIndex].close
      }));

      return {
        ticker: item.ticker,
        nameZh: item.nameZh || item.name || "",
        prices,
        orders,
        priceSource: "preview"
      };
    }

    function normalizeTradingData(trading, holdings, asOf) {
      const source = new Map(
        holdings
          .filter(isTradableHolding)
          .map((item, index) => [item.ticker, generatePreviewTradingForHolding(item, index, asOf)])
      );
      Object.entries(trading || {}).forEach(([ticker, item]) => {
        const fallback = source.get(ticker) || {};
        source.set(ticker, {
          ...fallback,
          ...item,
          prices: item.prices?.length ? item.prices : fallback.prices,
          orders: item.orders?.length ? item.orders : fallback.orders,
          priceSource: item.prices?.length ? "encrypted" : fallback.priceSource
        });
      });

      return [...source.entries()]
        .map(([ticker, item]) => {
          const holding = holdings.find((next) => next.ticker === ticker) || {};
          const prices = [...(item.prices || [])]
            .map((price) => ({
              date: price.date,
              time: new Date(`${price.date}T00:00:00`).getTime(),
              close: Number(price.close)
            }))
            .filter((price) => price.date && Number.isFinite(price.time) && Number.isFinite(price.close))
            .sort((a, b) => a.time - b.time);
          const orders = [...(item.orders || [])]
            .map((order) => ({
              date: order.date,
              time: new Date(`${order.date}T00:00:00`).getTime(),
              side: order.side === "sell" ? "sell" : "buy",
              shares: Number(order.shares || 0),
              price: Number(order.price || 0)
            }))
            .filter((order) => order.date && Number.isFinite(order.time) && Number.isFinite(order.price))
            .sort((a, b) => a.time - b.time);
          const first = prices[0]?.close || 0;
          const last = prices[prices.length - 1]?.close || 0;
          const returnPct = first ? (last - first) / first * 100 : 0;

          return {
            ticker,
            nameZh: item.nameZh || holding.nameZh || holding.name || "",
            prices,
            orders,
            returnPct,
            priceSource: item.priceSource || "encrypted"
          };
        })
        .filter((item) => item.prices.length > 1);
    }

    function normalizePublicPriceRows(rows) {
      return [...(rows || [])]
        .map((price) => ({
          date: price.date,
          time: new Date(`${price.date}T00:00:00`).getTime(),
          close: Number(price.close)
        }))
        .filter((price) => price.date && Number.isFinite(price.time) && Number.isFinite(price.close))
        .sort((a, b) => a.time - b.time);
    }

    function priceRowsFromMarketData(marketData, ticker) {
      if (!marketData) return [];
      if (Array.isArray(marketData[ticker])) return marketData[ticker];
      if (Array.isArray(marketData.prices?.[ticker])) return marketData.prices[ticker];
      if (Array.isArray(marketData.tickers?.[ticker]?.prices)) return marketData.tickers[ticker].prices;
      return [];
    }

    function applyPublicMarketPrices(marketData) {
      if (!state.data?.trading?.length || !marketData) return 0;
      let updated = 0;

      state.data.trading.forEach((item) => {
        const prices = normalizePublicPriceRows(priceRowsFromMarketData(marketData, item.ticker));
        if (prices.length <= 1) return;
        item.prices = prices;
        const first = prices[0]?.close || 0;
        const last = prices[prices.length - 1]?.close || 0;
        item.returnPct = first ? (last - first) / first * 100 : 0;
        item.priceSource = marketData.source || "public";
        updated += 1;
      });

      return updated;
    }

    async function hydratePublicMarketPrices() {
      const marketData = await fetchPublicMarketPrices();
      const updated = applyPublicMarketPrices(marketData);
      if (!updated) return;
      state.marketPrices = marketData;
      renderTrading();
      showToast(`已载入 ${updated} 个公开价格序列`);
    }

    async function refreshData() {
      if (PREVIEW_MODE) {
        activateData(EMBEDDED_DATA);
        showToast("预览数据已重新载入");
        return;
      }

      if (!state.password) return;

      $("refreshBtn").disabled = true;
      setButtonLabel("refreshBtn", "刷新中");

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, state.password);
        state.data = normalizeData(data);
        state.marketPrices = null;
        state.selectedHolding = Math.min(state.selectedHolding, state.data.holdings.length - 1);
        state.selectedPerformance = Math.min(state.selectedPerformance, state.data.performance.items.length - 1);
        state.selectedTradingTicker = state.data.trading.some((item) => item.ticker === state.selectedTradingTicker)
          ? state.selectedTradingTicker
          : state.data.trading[0]?.ticker || "";
        state.selectedTrade = 0;
        render();
        hydratePublicMarketPrices();
        showToast("数据已刷新");
      } catch (err) {
        showToast("刷新失败，请确认密码或数据文件");
      } finally {
        $("refreshBtn").disabled = false;
        setButtonLabel("refreshBtn", "刷新数据");
      }
    }

    function polar(cx, cy, r, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle)
      };
    }

    function donutPath(cx, cy, outerR, innerR, startAngle, endAngle) {
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      const p1 = polar(cx, cy, outerR, startAngle);
      const p2 = polar(cx, cy, outerR, endAngle);
      const p3 = polar(cx, cy, innerR, endAngle);
      const p4 = polar(cx, cy, innerR, startAngle);

      return [
        `M ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`,
        `A ${outerR} ${outerR} 0 ${largeArc} 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)}`,
        `L ${p3.x.toFixed(3)} ${p3.y.toFixed(3)}`,
        `A ${innerR} ${innerR} 0 ${largeArc} 0 ${p4.x.toFixed(3)} ${p4.y.toFixed(3)}`,
        "Z"
      ].join(" ");
    }

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function centerLabel(value, max = 12) {
      const text = String(value || "");
      if (text.length <= max) return text;
      return `${text.slice(0, max - 1)}…`;
    }

    function hexToRgb(hex) {
      const normalized = String(hex).replace("#", "");
      if (normalized.length !== 6) return "0, 200, 5";
      return [
        parseInt(normalized.slice(0, 2), 16),
        parseInt(normalized.slice(2, 4), 16),
        parseInt(normalized.slice(4, 6), 16)
      ].join(", ");
    }

    function renderDonut(svgId, items, valueGetter, selectedIndex, selectFn, centerRenderer) {
      const svg = $(svgId);
      const total = items.reduce((sum, item) => sum + Math.max(0, Number(valueGetter(item))), 0);
      svg.innerHTML = "";

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "152",
        fill: "none",
        stroke: "#edf2ea",
        "stroke-width": "36"
      }));

      let angle = 0;
      const slices = svgEl("g");

      items.forEach((item, index) => {
        const value = Math.max(0, Number(valueGetter(item)));
        const end = angle + (total ? value / total * 360 : 0);
        const color = state.colors[index % state.colors.length];
        const path = svgEl("path", {
          d: donutPath(180, 180, 154, 92, angle, end),
          fill: color,
          stroke: "#ffffff",
          "stroke-width": "1.5",
          "stroke-linejoin": "round",
          class: [
            "slice-group",
            index === selectedIndex ? "active" : "",
            index !== selectedIndex ? "dim" : ""
          ].join(" ").trim(),
          tabindex: "0"
        });
        path.dataset.index = String(index);

        path.addEventListener("mouseenter", () => selectFn(index));
        path.addEventListener("click", () => selectFn(index));
        path.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectFn(index);
          }
        });

        slices.appendChild(path);
        angle = end;
      });

      svg.appendChild(slices);

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "154",
        fill: "none",
        stroke: "#e3e9df",
        "stroke-width": "1"
      }));

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "92",
        fill: "none",
        stroke: "#e3e9df",
        "stroke-width": "1"
      }));

      const center = svgEl("g", {
        "text-anchor": "middle",
        "dominant-baseline": "middle"
      });

      center.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "68",
        fill: "#ffffff",
        stroke: "#e3e9df",
        "stroke-width": "1"
      }));

      centerRenderer(center);
      svg.appendChild(center);
    }

    function addSvgText(parent, text, attrs) {
      const nextAttrs = {
        ...attrs,
        class: ["center-copy", attrs.class || ""].join(" ").trim()
      };
      const el = svgEl("text", nextAttrs);
      el.textContent = text;
      parent.appendChild(el);
    }

    function setSvgText(id, text, attrs = {}) {
      const el = $(id);
      if (!el) return;
      el.textContent = text;
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
    }

    function animateCenter(svgId, updateFn) {
      const svg = $(svgId);
      if (!svg) {
        updateFn();
        return;
      }

      window.clearTimeout(animateCenter.timers[svgId]);
      svg.classList.add("center-changing");
      animateCenter.timers[svgId] = window.setTimeout(() => {
        updateFn();
        window.requestAnimationFrame(() => svg.classList.remove("center-changing"));
      }, 90);
    }

    animateCenter.timers = {};

    function updateDonutSelection(svgId, selectedIndex) {
      const svg = $(svgId);
      if (!svg) return;

      svg.querySelectorAll(".slice-group").forEach((slice) => {
        const active = Number(slice.dataset.index) === selectedIndex;
        slice.classList.toggle("active", active);
        slice.classList.toggle("dim", !active);
      });
    }

    function updateRowSelection(listId, rowSelector, selectedIndex) {
      const list = $(listId);
      if (!list) return;

      list.querySelectorAll(rowSelector).forEach((row) => {
        row.classList.toggle("active", Number(row.dataset.index) === selectedIndex);
      });
    }

    function formatChartDate(date) {
      if (!date) return "";
      const parts = date.split("-");
      if (parts.length < 3) return date;
      return `${parts[1]}/${parts[2]}`;
    }

    function currentTradingItem() {
      return state.data.trading.find((item) => item.ticker === state.selectedTradingTicker) || state.data.trading[0];
    }

    function nearestPrice(prices, time) {
      return prices.reduce((best, price) => {
        if (!best) return price;
        return Math.abs(price.time - time) < Math.abs(best.time - time) ? price : best;
      }, null);
    }

    function scaleLinear(domainMin, domainMax, rangeMin, rangeMax) {
      const span = domainMax - domainMin || 1;
      return (value) => rangeMin + (value - domainMin) / span * (rangeMax - rangeMin);
    }

    function priceSourceLabel(source) {
      if (source === "encrypted") return "内置价格";
      if (source === "preview") return "预览价格";
      if (!source) return "价格数据";
      return "公开价格";
    }

      });

    function renderTradeChart() {
      const item = currentTradingItem();
      const svg = $("tradeChart");
      svg.innerHTML = "";
      if (!item) return;

      const width = 860;
      const height = 430;
      const padding = { left: 62, right: 24, top: 34, bottom: 52 };
      const chartLeft = padding.left;
      const chartRight = width - padding.right;
      const chartTop = padding.top;
      const chartBottom = height - padding.bottom;
      const times = item.prices.map((price) => price.time);
      const closes = [
        ...item.prices.map((price) => price.close),
        ...item.orders.map((order) => order.price)
      ].filter((value) => Number.isFinite(value));
      const minTime = Math.min(...times);
      const maxTime = Math.max(...times);
      const minClose = Math.min(...closes);
      const maxClose = Math.max(...closes);
      const pricePad = (maxClose - minClose || maxClose * 0.04 || 1) * 0.12;
      const yMin = minClose - pricePad;
      const yMax = maxClose + pricePad;
      const x = scaleLinear(minTime, maxTime, chartLeft, chartRight);
      const y = scaleLinear(yMin, yMax, chartBottom, chartTop);
      const points = item.prices.map((price) => ({
        ...price,
        x: x(price.time),
        y: y(price.close)
      }));
      const line = points.map((point, index) => `${index ? "L" : "M"} ${point.x.toFixed(2)} ${point.y.toFixed(2)}`).join(" ");
      const area = `${line} L ${points[points.length - 1].x.toFixed(2)} ${chartBottom} L ${points[0].x.toFixed(2)} ${chartBottom} Z`;

      const grid = svgEl("g");
      for (let i = 0; i <= 4; i++) {
        const pct = i / 4;
        const gy = chartTop + (chartBottom - chartTop) * pct;
        const value = yMax - (yMax - yMin) * pct;
        grid.appendChild(svgEl("line", {
          x1: String(chartLeft),
          x2: String(chartRight),
          y1: gy.toFixed(2),
          y2: gy.toFixed(2),
          class: "grid-line"
        }));
        const label = svgEl("text", {
          x: "12",
          y: (gy + 4).toFixed(2),
          class: "axis-label"
        });
        label.textContent = formatCurrency(value);
        grid.appendChild(label);
      }

      const xLabels = [points[0], points[Math.floor(points.length / 2)], points[points.length - 1]];
      xLabels.forEach((point, index) => {
        const label = svgEl("text", {
          x: point.x.toFixed(2),
          y: String(height - 16),
          "text-anchor": index === 0 ? "start" : index === 2 ? "end" : "middle",
          class: "axis-label"
        });
        label.textContent = formatChartDate(point.date);
        grid.appendChild(label);
      });

      grid.appendChild(svgEl("line", {
        x1: String(chartLeft),
        x2: String(chartRight),
        y1: String(chartBottom),
        y2: String(chartBottom),
        class: "axis-line"
      }));
      svg.appendChild(grid);

      svg.appendChild(svgEl("path", { d: area, class: "price-area" }));
      svg.appendChild(svgEl("path", { d: line, class: "price-path" }));

      const markerLayer = svgEl("g");
      item.orders.forEach((order, index) => {
        const close = nearestPrice(item.prices, order.time);
        const markerX = x(order.time);
        const markerY = y(order.price || close.close);
        const isSell = order.side === "sell";
        const marker = svgEl("g", {
          class: `trade-marker ${index === state.selectedTrade ? "active" : "dim"}`,
          transform: `translate(${markerX.toFixed(2)} ${markerY.toFixed(2)})`,
          tabindex: "0"
        });
        marker.dataset.index = String(index);
        marker.dataset.x = markerX.toFixed(2);
        marker.dataset.y = markerY.toFixed(2);

        const dot = svgEl("g", { class: "marker-dot" });
        dot.appendChild(svgEl("circle", {
          cx: "0",
          cy: "0",
          r: "13",
          fill: isSell ? "#ff5000" : "#00c805",
          stroke: "#ffffff",
          "stroke-width": "3"
        }));
        const label = svgEl("text", {
          x: "0",
          y: "4",
          "text-anchor": "middle",
          class: "marker-label"
        });
        label.textContent = isSell ? "S" : "B";
        dot.appendChild(label);
        marker.appendChild(dot);

        marker.addEventListener("mouseenter", () => selectTrade(index));
        marker.addEventListener("click", () => selectTrade(index));
        marker.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectTrade(index);
          }
        });

        markerLayer.appendChild(marker);
      });
      svg.appendChild(markerLayer);

      const callout = svgEl("g", { id: "tradeCallout" });
      callout.appendChild(svgEl("rect", {
        x: "0",
        y: "0",
        width: "168",
        height: "50",
        rx: "12",
        class: "chart-callout"
      }));
      callout.appendChild(svgEl("text", {
        id: "tradeCalloutTitle",
        x: "12",
        y: "20",
        class: "chart-callout-text"
      }));
      callout.appendChild(svgEl("text", {
        id: "tradeCalloutSub",
        x: "12",
        y: "38",
        class: "chart-callout-text"
      }));
      svg.appendChild(callout);
    }

    function renderTradeSummary() {
      const item = currentTradingItem();
      if (!item) return;
      const first = item.prices[0];
      const last = item.prices[item.prices.length - 1];

      const sells = item.orders.filter((order) => order.side === "sell").length;

      $("tradeChartTitle").textContent = `${item.ticker} 交易轨迹`;
      $("tradeChartRange").textContent = `${formatChartDate(first.date)} - ${formatChartDate(last.date)} · ${priceSourceLabel(item.priceSource)}`;
      $("tradeReturn").textContent = formatSignedPct(item.returnPct);
      $("tradeReturn").className = `summary-value gain ${item.returnPct < 0 ? "negative" : ""}`;
      $("tradeBuyCount").textContent = `${buys} 次`;
      $("tradeSellCount").textContent = `${sells} 次`;
    }

      $("tradeChartRange").textContent = "";
      $("tradeChart").innerHTML = "";
      $("tradeReturn").textContent = "–";
      $("tradeBuyCount").textContent = "–";

    function renderTrading() {
      if (!state.data.trading.length) {
        renderTradingEmpty();
        return;
      }
      if (!state.selectedTradingTicker) state.selectedTradingTicker = state.data.trading[0].ticker;
      renderTradeSummary();
      renderTickerSelector();
      renderTradeList();
      renderTradeChart();
      updateTradeSelection(false);
    }

    function updateTradeSelection() {
      const item = currentTradingItem();
      if (!item) return;
      const order = item.orders[state.selectedTrade] || item.orders[0];
      if (!order) return;
      state.selectedTrade = Math.max(0, item.orders.indexOf(order));
      const isSell = order.side === "sell";

      updateRowSelection("tradeList", ".trade-row", state.selectedTrade);
      $("tradeDetail").innerHTML = `
        <div class="trade-detail-head">
          <div class="trade-detail-title">${escapeHtml(item.ticker)} ${isSell ? "卖出" : "买入"}</div>
          <div class="trade-detail-side ${isSell ? "sell" : ""}">${formatCurrencyFull(order.price)}</div>
        </div>
        <div class="trade-detail-text">${formatChartDate(order.date)} · ${order.shares} 股 · ${isSell ? "降低仓位" : "增加仓位"}</div>
      `;

      const svg = $("tradeChart");
      svg.querySelectorAll(".trade-marker").forEach((marker) => {
        const active = Number(marker.dataset.index) === state.selectedTrade;
        marker.classList.toggle("active", active);
        marker.classList.toggle("dim", !active);
      });

      const marker = svg.querySelector(`.trade-marker[data-index="${state.selectedTrade}"]`);
      const callout = $("tradeCallout");
      if (!marker || !callout) return;

      const markerX = Number(marker.dataset.x);
      const markerY = Number(marker.dataset.y);
      const calloutX = Math.max(66, Math.min(668, markerX + 18));
      const calloutY = Math.max(18, Math.min(330, markerY - 64));
      callout.setAttribute("transform", `translate(${calloutX.toFixed(2)} ${calloutY.toFixed(2)})`);
      setSvgText("tradeCalloutTitle", `${isSell ? "卖出" : "买入"} ${order.shares} 股`);
      setSvgText("tradeCalloutSub", `${formatChartDate(order.date)} · ${formatCurrencyFull(order.price)}`);
    }

    function selectTradingTicker(ticker) {
      if (state.selectedTradingTicker === ticker) return;
      state.selectedTradingTicker = ticker;
      state.selectedTrade = 0;
      renderTrading();
    }

    function selectTrade(index) {
      if (state.selectedTrade === index) return;
      state.selectedTrade = index;
      updateTradeSelection();
    }

    function numericOrNull(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function holdingGain(item) {
      const explicitGain = numericOrNull(item.unrealizedGain);
      if (explicitGain !== null) return explicitGain;

      const value = numericOrNull(item.value);
      const costBasis = numericOrNull(item.costBasis);
      if (value === null || costBasis === null) return null;

      return value - costBasis;
    }

    function holdingReturnPct(item, gain) {
      const explicitPct = numericOrNull(item.unrealizedReturnPct);
      if (explicitPct !== null) return explicitPct;

      const costBasis = numericOrNull(item.costBasis);
      if (!costBasis) return null;

      return gain / costBasis * 100;
    }

    function renderRanking() {
      const list = $("rankList");
      const ranked = [...state.data.holdings]
        .map((item) => {
          const gain = holdingGain(item);
          const returnPct = gain === null ? null : holdingReturnPct(item, gain);
          return { ...item, computedGain: gain, computedReturnPct: returnPct };
        })
        .filter((item) => item.computedGain !== null)
        .sort((a, b) => b.computedGain - a.computedGain);

      list.innerHTML = "";

      if (!ranked.length) {
        const empty = document.createElement("div");
        empty.className = "rank-row";
        empty.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">暂无浮盈明细</div>
            <div class="rank-sub">缺少成本基础数据时不会显示该模块</div>
          </div>
        `;
        list.appendChild(empty);
        return;
      }

      ranked.forEach((item) => {
        const row = document.createElement("div");
        row.className = "rank-row";
        row.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">${escapeHtml(item.ticker)} ${escapeHtml(item.nameZh || "")}</div>
            <div class="rank-sub">成本 ${formatCurrency(item.costBasis)} · 当前 ${formatCurrency(item.value)}</div>
          </div>
          <div class="rank-gain">
            <div class="gain ${item.computedGain < 0 ? "negative" : ""}">${formatSignedCurrency(item.computedGain)}</div>
            <div class="val">${item.computedReturnPct === null ? "–" : formatSignedPct(item.computedReturnPct)}</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function renderSummary() {
      const data = state.data;
      const holdings = data.holdings;
      const largest = holdings[0];
      const perf = data.performance;

      $("meta").textContent = `${data.asOf || "latest"} · ${data.currency || "USD"} · CD + 股票 / ETF`;
      $("largestHolding").textContent = `${largest.ticker} ${formatPct(largest.weight)}`;
      $("holdingCount").textContent = `${holdings.length} 个`;

      $("totalGain").textContent = formatSignedCurrency(perf.totalGain);
      $("totalGain").className = `metric-value gain ${perf.totalGain < 0 ? "negative" : ""}`;
      $("totalGainSub").textContent = `本金 ${formatCurrency(perf.totalPrincipal)}，当前 ${formatCurrency(perf.totalCurrentValue)}`;
      $("totalReturn").textContent = formatSignedPct(perf.totalReturnPct);
      $("totalReturn").className = `metric-value gain ${perf.totalReturnPct < 0 ? "negative" : ""}`;
      $("totalCurrent").textContent = formatCurrency(perf.totalCurrentValue);
      $("totalPrincipal").textContent = formatCurrency(perf.totalPrincipal);
      $("gainSourceCount").textContent = `${perf.items.length} 类`;
      $("perfDate").textContent = data.asOf || "latest";
    }

    function switchTab(tab) {
      state.activeTab = tab;
      $("tabs").dataset.active = tab;
      const tabIds = {
        holdings: "holdingsTab",
        performance: "performanceTab",
        trading: "tradingTab"
      };
      const panelIds = {
        holdings: "holdingsPanel",
        performance: "performancePanel",
        trading: "tradingPanel"
      };

      Object.entries(tabIds).forEach(([key, id]) => {
        const active = key === tab;
        $(id).classList.toggle("active", active);
        $(id).setAttribute("aria-selected", active ? "true" : "false");
      });

      const activePanel = $(panelIds[tab]);
      const inactivePanels = Object.entries(panelIds)
        .filter(([key]) => key !== tab)
        .map(([, id]) => $(id));
      if (activePanel.classList.contains("active") && activePanel.classList.contains("panel-ready") && inactivePanels.every((panel) => !panel.classList.contains("active"))) {
        return;
      }

      inactivePanels.forEach((panel) => panel.classList.remove("panel-ready", "active"));
      activePanel.classList.add("active");
      activePanel.classList.remove("panel-ready");
      window.requestAnimationFrame(() => activePanel.classList.add("panel-ready"));
    }

    function render() {
      renderSummary();
      renderHoldingsChart();
      renderHoldingList();
      renderGainChart();
      renderPerformanceList();
      renderRanking();
      renderTrading();
      updateHoldingSelection(false);
      updatePerformanceSelection(false);
      switchTab(state.activeTab);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("unlockBtn").addEventListener("click", unlock);
    $("refreshBtn").addEventListener("click", refreshData);
    $("lockBtn").addEventListener("click", lockPage);

    $("holdingsTab").addEventListener("click", () => switchTab("holdings"));
    $("performanceTab").addEventListener("click", () => switchTab("performance"));
    $("tradingTab").addEventListener("click", () => switchTab("trading"));

    $("passwordInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
    });

    window.addEventListener("load", () => {
      if (PREVIEW_MODE && EMBEDDED_DATA) {
        activateData(EMBEDDED_DATA);
        showToast("预览模式");
      } else {
        $("passwordInput").focus();
      }
    });
  </script>
</body>
</html>
