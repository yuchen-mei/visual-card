<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>持仓与收益</title>
  <style>
    :root {
      --bg: #090a08;
      --bg-warm: #15100d;
      --bg-cool: #071111;
      --text: rgba(255, 255, 255, 0.95);
      --muted: rgba(255, 255, 255, 0.66);
      --soft: rgba(255, 255, 255, 0.46);
      --edge: rgba(255, 255, 255, 0.18);
      --edge-strong: rgba(255, 255, 255, 0.32);
      --surface: rgba(255, 255, 255, 0.075);
      --surface-strong: rgba(255, 255, 255, 0.12);
      --dark-glass: rgba(7, 10, 10, 0.54);
      --good: #8ef6bf;
      --danger: #ff9aaa;
      --warn: #ffd778;
      --cyan: #79e7ff;
      --mint: #6ff0c2;
      --rose: #ff8da1;
      --violet: #b9a5ff;
      --amber: #ffd36a;
      --shadow: 0 32px 110px rgba(0, 0, 0, 0.48);
      --soft-shadow: 0 18px 60px rgba(0, 0, 0, 0.26);
      --shell-radius: 30px;
      --card-radius: 8px;
      --button-radius: 14px;
      --spring: cubic-bezier(0.2, 0.9, 0.22, 1);
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    html {
      background: var(--bg);
    }

    body {
      overflow-x: hidden;
      color: var(--text);
      background:
        linear-gradient(118deg, rgba(255, 211, 106, 0.14), transparent 24%),
        linear-gradient(218deg, rgba(111, 240, 194, 0.14), transparent 34%),
        linear-gradient(335deg, rgba(255, 141, 161, 0.12), transparent 42%),
        linear-gradient(145deg, var(--bg), var(--bg-warm) 44%, var(--bg-cool));
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Text",
        "Segoe UI",
        "PingFang SC",
        "Hiragino Sans GB",
        "Microsoft YaHei",
        sans-serif;
      font-variant-numeric: tabular-nums;
      text-rendering: geometricPrecision;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -28%;
      pointer-events: none;
      z-index: -2;
    }

    body::before {
      background:
        conic-gradient(
          from 120deg at 50% 48%,
          rgba(121, 231, 255, 0.18),
          transparent 18%,
          rgba(255, 211, 106, 0.16) 29%,
          transparent 45%,
          rgba(255, 141, 161, 0.14) 58%,
          transparent 76%,
          rgba(111, 240, 194, 0.18)
        );
      filter: blur(42px) saturate(1.22);
      opacity: 0.78;
      transform-origin: center;
    }

    body::after {
      inset: 0;
      z-index: -1;
      opacity: 0.22;
      background:
        repeating-linear-gradient(115deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 18px),
        repeating-linear-gradient(22deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 14px);
      mask-image: linear-gradient(180deg, transparent, #000 18%, #000 76%, transparent);
    }

    .shell {
      width: min(1220px, calc(100% - 28px));
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 0 max(28px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    .glass {
      position: relative;
      width: 100%;
      min-height: min(900px, calc(100svh - 42px));
      overflow: hidden;
      isolation: isolate;
      border: 1px solid var(--edge);
      border-radius: var(--shell-radius);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.055) 45%, rgba(255, 255, 255, 0.1)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.055), rgba(255, 255, 255, 0.025)),
        rgba(6, 8, 9, 0.42);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.32);
      backdrop-filter: blur(34px) saturate(1.26);
      -webkit-backdrop-filter: blur(34px) saturate(1.26);
    }

    .glass::before,
    .glass::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .glass::before {
      background:
        linear-gradient(112deg, transparent 0 24%, rgba(255, 255, 255, 0.1) 39%, transparent 55% 100%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 34%);
      opacity: 0.48;
    }

    .glass::after {
      background:
        linear-gradient(90deg, rgba(121, 231, 255, 0.08), transparent 33%, rgba(255, 211, 106, 0.07) 62%, rgba(255, 141, 161, 0.06));
      mix-blend-mode: screen;
      opacity: 0.62;
    }

    .lock,
    .dashboard {
      position: relative;
      z-index: 1;
    }

    .lock {
      min-height: min(820px, calc(100svh - 42px));
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .lock-card,
    .chart-card,
    .list-card,
    .metric-card,
    .perf-card,
    .ranking-card,
    .summary-item,
    .holding,
    .perf-row,
    .rank-row {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border: 1px solid var(--edge);
      background:
        linear-gradient(155deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.055) 52%, rgba(255, 255, 255, 0.085)),
        rgba(255, 255, 255, 0.045);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.19), 0 18px 42px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(26px) saturate(1.18);
      -webkit-backdrop-filter: blur(26px) saturate(1.18);
    }

    .lock-card::before,
    .chart-card::before,
    .list-card::before,
    .metric-card::before,
    .perf-card::before,
    .ranking-card::before,
    .summary-item::before,
    .holding::before,
    .perf-row::before,
    .rank-row::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.1), transparent 38%),
        linear-gradient(135deg, rgba(121, 231, 255, 0.065), transparent 44%, rgba(255, 211, 106, 0.06));
      opacity: 0;
      transition: opacity 300ms var(--ease-out);
    }

    .lock-card:hover::before,
    .chart-card:hover::before,
    .list-card:hover::before,
    .metric-card:hover::before,
    .perf-card:hover::before,
    .ranking-card:hover::before,
    .summary-item:hover::before,
    .holding:hover::before,
    .perf-row:hover::before,
    .rank-row:hover::before {
      opacity: 1;
    }

    .lock-card {
      width: min(520px, 100%);
      padding: 34px;
      border-radius: 24px;
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 7px 11px;
      border: 1px solid var(--edge);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      letter-spacing: 0;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--mint);
      box-shadow: 0 0 20px rgba(111, 240, 194, 0.82);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 2.85rem;
      line-height: 1.03;
      font-weight: 850;
      letter-spacing: 0;
    }

    .lock-card p {
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .input-row {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--edge);
      outline: none;
      border-radius: var(--button-radius);
      padding: 15px 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.085);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
      font-size: 16px;
      font-weight: 520;
      transition: border-color 180ms var(--ease-out), background 180ms var(--ease-out), box-shadow 180ms var(--ease-out);
    }

    input:focus {
      border-color: rgba(121, 231, 255, 0.72);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 4px rgba(121, 231, 255, 0.11), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    input::placeholder {
      color: var(--soft);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 48px;
      border: 0;
      border-radius: var(--button-radius);
      padding: 13px 17px;
      color: #09100f;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.96), rgba(121, 231, 255, 0.86) 50%, rgba(142, 246, 191, 0.82)),
        #dffcff;
      font-weight: 780;
      font-size: 15px;
      letter-spacing: 0;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 16px 34px rgba(121, 231, 255, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.62);
      transition: transform 220ms var(--spring), box-shadow 220ms var(--ease-out), filter 220ms var(--ease-out);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 44px rgba(121, 231, 255, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    button:active {
      transform: translateY(0) scale(0.985);
    }

    button.secondary {
      color: var(--text);
      border: 1px solid var(--edge);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.055)),
        rgba(255, 255, 255, 0.055);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.17);
    }

    button.secondary:hover {
      border-color: var(--edge-strong);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.22);
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
      filter: grayscale(0.2);
    }

    .error {
      min-height: 24px;
      margin-top: 14px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.55;
    }

    .dashboard {
      display: none;
      padding: 30px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 22px;
      align-items: start;
      margin-bottom: 20px;
    }

    .title-block {
      min-width: 0;
    }

    .title-block h2 {
      margin-top: 12px;
      font-size: 3rem;
      line-height: 1.04;
      font-weight: 850;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-top: 2px;
    }

    .metric-label,
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 680;
      letter-spacing: 0;
    }

    .tabs {
      position: sticky;
      top: max(10px, env(safe-area-inset-top));
      z-index: 5;
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(112px, 1fr));
      gap: 6px;
      min-height: 52px;
      padding: 6px;
      border-radius: 18px;
      border: 1px solid var(--edge);
      background: rgba(12, 15, 14, 0.54);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16), 0 18px 42px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(24px) saturate(1.22);
      -webkit-backdrop-filter: blur(24px) saturate(1.22);
      margin-bottom: 18px;
      isolation: isolate;
    }

    .tabs::before {
      content: "";
      position: absolute;
      top: 6px;
      bottom: 6px;
      left: 6px;
      width: calc((100% - 18px) / 2);
      border-radius: 13px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.98), rgba(121, 231, 255, 0.82) 55%, rgba(255, 211, 106, 0.68)),
        #e7fffb;
      box-shadow: 0 14px 32px rgba(121, 231, 255, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.62);
      transform: translateX(0);
      transition: transform 460ms var(--spring), box-shadow 260ms var(--ease-out);
      z-index: -1;
    }

    .tabs[data-active="performance"]::before {
      transform: translateX(calc(100% + 6px));
    }

    .tab {
      min-height: 40px;
      color: var(--muted);
      border: 0;
      border-radius: 13px;
      padding: 9px 18px;
      background: transparent;
      box-shadow: none;
      font-weight: 740;
      transition: color 260ms var(--ease-out), transform 260ms var(--spring);
      position: relative;
      z-index: 1;
    }

    .tab:hover {
      transform: none;
      box-shadow: none;
      color: var(--text);
    }

    .tab.active {
      color: #07100e;
    }

    .panel {
      display: none;
      opacity: 0;
      transform: translateY(14px) scale(0.992);
      transition: opacity 320ms var(--ease-out), transform 430ms var(--spring);
    }

    .panel.active {
      display: block;
    }

    .panel.active.panel-ready {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(360px, 0.86fr);
      gap: 18px;
      align-items: stretch;
    }

    .performance-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(360px, 1.08fr);
      gap: 18px;
      align-items: stretch;
    }

    .chart-card,
    .list-card,
    .metric-card,
    .perf-card,
    .ranking-card,
    .summary-item {
      border-radius: var(--card-radius);
    }

    .chart-card {
      min-height: 650px;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 20px;
    }

    .chart-wrap {
      position: relative;
      min-height: 500px;
      display: grid;
      place-items: center;
    }

    .chart-wrap::before {
      content: "";
      position: absolute;
      width: min(70%, 410px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background:
        conic-gradient(from 210deg, rgba(121, 231, 255, 0.1), rgba(255, 211, 106, 0.06), rgba(255, 141, 161, 0.08), rgba(111, 240, 194, 0.09), rgba(121, 231, 255, 0.1));
      filter: blur(1px);
      opacity: 0.44;
    }

    svg {
      position: relative;
      z-index: 1;
      width: min(100%, 535px);
      height: auto;
      display: block;
      overflow: visible;
      filter: drop-shadow(0 28px 32px rgba(0, 0, 0, 0.24));
    }

    .slice-group {
      cursor: pointer;
      transform-origin: 180px 180px;
      transition: transform 520ms var(--spring), opacity 380ms var(--ease-out), filter 420ms var(--ease-out);
    }

    .slice-group:hover,
    .slice-group.active {
      transform: scale(1.024);
      filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.34));
      opacity: 1;
    }

    .slice-group.dim {
      opacity: 0.7;
    }

    .slice-base,
    .slice-shine,
    .slice-edge {
      transition: opacity 380ms var(--ease-out), stroke-width 420ms var(--spring), filter 420ms var(--ease-out);
    }

    .slice-base {
      opacity: 0.76;
      pointer-events: auto;
    }

    .slice-shine {
      opacity: 0.44;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .slice-edge {
      opacity: 0.5;
      pointer-events: none;
    }

    .slice-group.active .slice-base,
    .slice-group:hover .slice-base {
      opacity: 0.94;
    }

    .slice-group.active .slice-shine,
    .slice-group:hover .slice-shine {
      opacity: 0.88;
    }

    .slice-group.active .slice-edge,
    .slice-group:hover .slice-edge {
      opacity: 0.96;
      stroke-width: 2.2px;
    }

    .slice-refraction {
      opacity: 0.24;
      pointer-events: none;
      mix-blend-mode: screen;
      transition: opacity 380ms var(--ease-out), stroke-width 420ms var(--spring);
    }

    .slice-group.active .slice-refraction,
    .slice-group:hover .slice-refraction {
      opacity: 0.52;
      stroke-width: 10px;
    }

    .donut-glass {
      pointer-events: none;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.28));
    }

    .donut-sheen {
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .center-copy {
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 180ms var(--ease-out), transform 280ms var(--spring);
    }

    svg.center-changing .center-copy {
      opacity: 0;
      transform: translateY(5px) scale(0.98);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .summary-strip.holdings-summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .summary-item {
      min-width: 0;
      padding: 14px;
    }

    .summary-value {
      margin-top: 7px;
      font-size: 1.06rem;
      font-weight: 820;
      letter-spacing: 0;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .list-card,
    .perf-card,
    .ranking-card {
      padding: 16px;
    }

    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 2px 2px 14px;
      gap: 14px;
    }

    .list-head strong {
      font-size: 1.14rem;
      font-weight: 820;
      letter-spacing: 0;
    }

    .list-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .holding-list,
    .perf-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .holding,
    .perf-row,
    .rank-row {
      border-radius: var(--card-radius);
      cursor: pointer;
      transition: transform 240ms var(--spring), border-color 240ms var(--ease-out), background 240ms var(--ease-out), box-shadow 240ms var(--ease-out);
    }

    .holding {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 13px 14px;
    }

    .holding:hover,
    .holding.active,
    .perf-row.active,
    .perf-row:hover,
    .rank-row:hover {
      transform: translateY(-2px);
      border-color: var(--edge-strong);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.075)),
        rgba(255, 255, 255, 0.075);
      box-shadow: 0 18px 38px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .swatch {
      width: 11px;
      height: 42px;
      border-radius: 999px;
      box-shadow: 0 0 22px color-mix(in srgb, var(--accent, var(--cyan)) 58%, transparent);
    }

    .holding-main,
    .rank-main {
      min-width: 0;
    }

    .ticker-line {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .ticker,
    .perf-name,
    .rank-title {
      font-weight: 820;
      letter-spacing: 0;
    }

    .ticker {
      font-size: 1rem;
    }

    .kind {
      color: var(--muted);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.11);
      white-space: nowrap;
    }

    .zh {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .holding-side {
      text-align: right;
      min-width: max-content;
    }

    .pct {
      font-size: 1rem;
      font-weight: 820;
      letter-spacing: 0;
    }

    .val {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric-card {
      min-height: 136px;
      padding: 18px;
    }

    .metric-card.primary {
      background:
        linear-gradient(135deg, rgba(142, 246, 191, 0.16), rgba(121, 231, 255, 0.1), rgba(255, 255, 255, 0.06)),
        rgba(255, 255, 255, 0.055);
    }

    .metric-value {
      margin-top: 12px;
      font-size: 1.95rem;
      font-weight: 860;
      letter-spacing: 0;
      line-height: 1.06;
      overflow-wrap: anywhere;
    }

    .metric-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .perf-row {
      padding: 15px;
    }

    .perf-row-top,
    .perf-row-bottom {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
    }

    .perf-name {
      font-size: 1.05rem;
      min-width: 0;
    }

    .gain {
      color: var(--good);
      font-weight: 940;
      letter-spacing: 0;
    }

    .gain.negative {
      color: var(--danger);
    }

    .perf-row-bottom {
      margin-top: 8px;

    .bar-track {

      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.22);

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent, var(--cyan)), var(--mint), var(--amber));

      box-shadow: 0 0 20px rgba(121, 231, 255, 0.34);

    .rank-row {

    .rank-sub {

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: calc(100% - 28px);
      padding: 12px 14px;
      border: 1px solid var(--edge);
      border-radius: 14px;
      background: rgba(10, 12, 12, 0.76);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      color: var(--text);
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms var(--ease-out), transform 220ms var(--spring);
      z-index: 20;
      backdrop-filter: blur(22px) saturate(1.18);
      -webkit-backdrop-filter: blur(22px) saturate(1.18);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-5px);
    }

    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .glass,
      .lock-card,
      .chart-card,
      .list-card,
      .metric-card,
      .perf-card,
      .ranking-card,
      .summary-item,
      .holding,
      .perf-row,
      .rank-row,

    @media (max-width: 1080px) {
      .main-grid,
      .performance-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .perf-card {
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100%, 680px);
        padding: 10px;
        align-items: start;
      }

      .glass {
        min-height: calc(100svh - 20px);
        border-radius: 24px;

        padding: 16px;

      .rank-list {

      .lock {

    @media (max-width: 430px) {

    @media (prefers-reduced-motion: reduce) {

<body>
  <main class="shell">
    <section class="glass">
      <div id="lock" class="lock">
        <div class="lock-card">

            </div>

          <div class="performance-grid">

                <svg id="gainChart" viewBox="0 0 360 360" role="img" aria-label="收益来源饼图"></svg>

                  <div class="summary-label">本金</div>

          <section class="ranking-card">

  </main>

  <div id="toast" class="toast"></div>

  <script>
    const EMBEDDED_DATA = null;
    const PREVIEW_MODE = false;

    const state = {
      password: "",
      data: null,
      selectedHolding: 0,
      selectedPerformance: 0,
      activeTab: "holdings",
      colors: [
        "#79e7ff",
        "#6ff0c2",
        "#ffd36a",
        "#ff8da1",
        "#b9a5ff",
        "#f7a66a",
        "#8ef6bf",
        "#7ea7ff",
        "#f783d8",
        "#d6f36b"
      ]
    };

    const $ = (id) => document.getElementById(id);

    function setButtonLabel(id, text) {
      $(id).textContent = text;
    }

    const formatCurrency = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value || 0);
    };

    const formatCurrencyFull = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(value || 0);
    };

    const formatPct = (value) => `${(value || 0).toFixed(1)}%`;

    const formatSignedCurrency = (value) => {
      const abs = formatCurrency(Math.abs(value || 0));
      return `${value >= 0 ? "+" : "-"}${abs}`;
    };

    const formatSignedPct = (value) => `${value >= 0 ? "+" : ""}${(value || 0).toFixed(1)}%`;

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function base64ToBytes(base64) {
      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations,
          hash: "SHA-256"
        },
        material,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );
    }

    async function decryptPayload(encrypted, password) {
      const salt = base64ToBytes(encrypted.salt);
      const iv = base64ToBytes(encrypted.iv);
      const ciphertext = base64ToBytes(encrypted.ciphertext);
      const key = await deriveKey(password, salt, encrypted.iterations || 250000);

      const plaintext = await crypto.subtle.decrypt(
        {
          name: "AES-GCM",
          iv
        },
        key,
        ciphertext
      );

      const text = new TextDecoder().decode(plaintext);
      return JSON.parse(text);
    }

    async function fetchEncrypted() {
      const response = await fetch(`./data.enc.json?ts=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("无法读取 data.enc.json");
      }

      return response.json();
    }

    async function unlock() {
      const password = $("passwordInput").value.trim();
      const error = $("lockError");
      error.textContent = "";

      if (!password) {
        error.textContent = "请输入访问密码。";
        return;
      }

      $("unlockBtn").disabled = true;
      setButtonLabel("unlockBtn", "解密中");

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, password);
        state.password = password;
        activateData(data);
        showToast("已解锁");
      } catch (err) {
        error.textContent = "密码错误，或数据文件不可用。";
      } finally {
        $("unlockBtn").disabled = false;
        setButtonLabel("unlockBtn", "解锁");
      }
    }

    function activateData(data) {
      state.data = normalizeData(data);
      state.selectedHolding = 0;
      state.selectedPerformance = 0;

      $("lock").style.display = "none";
      $("dashboard").style.display = "block";
      render();
    }

    function normalizeData(data) {
      const holdings = [...data.holdings]
        .filter((item) => Number(item.value) > 0)
        .sort((a, b) => b.value - a.value);

      const total = holdings.reduce((sum, item) => sum + Number(item.value), 0);

      holdings.forEach((item) => {
        item.weight = Number(item.value) / total * 100;
      });

      return {
        ...data,
        equityValue: total,
        holdings
      };
    }

    async function refreshData() {
      if (PREVIEW_MODE) {
        activateData(EMBEDDED_DATA);
        showToast("预览数据已重新载入");
        return;
      }

      if (!state.password) return;

      $("refreshBtn").disabled = true;
      setButtonLabel("refreshBtn", "刷新中");

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, state.password);
        state.data = normalizeData(data);
        state.selectedHolding = Math.min(state.selectedHolding, state.data.holdings.length - 1);
        state.selectedPerformance = Math.min(state.selectedPerformance, state.data.performance.items.length - 1);
        render();
        showToast("数据已刷新");
      } catch (err) {
        showToast("刷新失败，请确认密码或数据文件");
      } finally {
        $("refreshBtn").disabled = false;
        setButtonLabel("refreshBtn", "刷新数据");
      }
    }

    function lockPage() {
      if (PREVIEW_MODE) {
        showToast("预览模式无需锁定");
        return;
      }

      state.password = "";
      state.data = null;
      state.selectedHolding = 0;
      $("passwordInput").value = "";
      $("dashboard").style.display = "none";
      $("lock").style.display = "grid";
      $("passwordInput").focus();
    }

    function polar(cx, cy, r, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle)
      };
    }

    function donutPath(cx, cy, outerR, innerR, startAngle, endAngle) {
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      const p1 = polar(cx, cy, outerR, startAngle);
      const p2 = polar(cx, cy, outerR, endAngle);
      const p3 = polar(cx, cy, innerR, endAngle);
      const p4 = polar(cx, cy, innerR, startAngle);

      return [
        `M ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`,
        `A ${outerR} ${outerR} 0 ${largeArc} 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)}`,
        `L ${p3.x.toFixed(3)} ${p3.y.toFixed(3)}`,
        `A ${innerR} ${innerR} 0 ${largeArc} 0 ${p4.x.toFixed(3)} ${p4.y.toFixed(3)}`,
        "Z"
      ].join(" ");
    }

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function centerLabel(value, max = 12) {
      const text = String(value || "");
      if (text.length <= max) return text;
      return `${text.slice(0, max - 1)}…`;
    }

    function appendStop(gradient, offset, color, opacity) {
      gradient.appendChild(svgEl("stop", {
        offset,
        "stop-color": color,
        "stop-opacity": opacity
      }));
    }

    function addGlassFilter(defs, svgId) {
      const filterId = `${svgId}-glass-filter`;
      const filter = svgEl("filter", {
        id: filterId,
        x: "-22%",
        y: "-22%",
        width: "144%",
        height: "144%",
        "color-interpolation-filters": "sRGB"
      });

      filter.appendChild(svgEl("feDropShadow", {
        dx: "0",
        dy: "12",
        stdDeviation: "9",
        "flood-color": "#000000",
        "flood-opacity": "0.18",
        result: "shadow"
      }));

      filter.appendChild(svgEl("feGaussianBlur", {
        in: "SourceAlpha",
        stdDeviation: "1.4",
        result: "softAlpha"
      }));

      const specular = svgEl("feSpecularLighting", {
        in: "softAlpha",
        surfaceScale: "4.2",
        specularConstant: "0.42",
        specularExponent: "28",
        "lighting-color": "#ffffff",
        result: "specular"
      });
      specular.appendChild(svgEl("fePointLight", {
        x: "-120",
        y: "-80",
        z: "260"
      }));
      filter.appendChild(specular);

      filter.appendChild(svgEl("feComposite", {
        in: "specular",
        in2: "SourceAlpha",
        operator: "in",
        result: "specularClip"
      }));

      const merge = svgEl("feMerge");
      merge.appendChild(svgEl("feMergeNode", { in: "shadow" }));
      merge.appendChild(svgEl("feMergeNode", { in: "SourceGraphic" }));
      merge.appendChild(svgEl("feMergeNode", { in: "specularClip" }));
      filter.appendChild(merge);
      defs.appendChild(filter);

      return filterId;
    }

    function addSliceGradients(defs, svgId, index, color) {
      const baseId = `${svgId}-base-${index}`;
      const shineId = `${svgId}-shine-${index}`;
      const edgeId = `${svgId}-edge-${index}`;
      const refractionId = `${svgId}-refraction-${index}`;

      const base = svgEl("linearGradient", {
        id: baseId,
        x1: "76",
        y1: "24",
        x2: "284",
        y2: "336",
        gradientUnits: "userSpaceOnUse"
      });
      appendStop(base, "0%", "#ffffff", "0.5");
      appendStop(base, "18%", color, "0.64");
      appendStop(base, "48%", color, "0.34");
      appendStop(base, "76%", "#ffffff", "0.16");
      appendStop(base, "100%", "#07100f", "0.34");
      defs.appendChild(base);

      const shine = svgEl("linearGradient", {
        id: shineId,
        x1: "96",
        y1: "28",
        x2: "262",
        y2: "278",
        gradientUnits: "userSpaceOnUse"
      });
      appendStop(shine, "0%", "#ffffff", "0.84");
      appendStop(shine, "20%", "#ffffff", "0.28");
      appendStop(shine, "52%", color, "0.08");
      appendStop(shine, "100%", "#ffffff", "0");
      defs.appendChild(shine);

      const edge = svgEl("linearGradient", {
        id: edgeId,
        x1: "58",
        y1: "72",
        x2: "312",
        y2: "312",
        gradientUnits: "userSpaceOnUse"
      });
      appendStop(edge, "0%", "#ffffff", "0.62");
      appendStop(edge, "38%", color, "0.5");
      appendStop(edge, "72%", "#ffffff", "0.18");
      appendStop(edge, "100%", "#ffffff", "0.46");
      defs.appendChild(edge);

      const refraction = svgEl("linearGradient", {
        id: refractionId,
        x1: "154",
        y1: "48",
        x2: "228",
        y2: "318",
        gradientUnits: "userSpaceOnUse"
      });
      appendStop(refraction, "0%", "#ffffff", "0.45");
      appendStop(refraction, "32%", "#ffffff", "0.06");
      appendStop(refraction, "58%", color, "0.22");
      appendStop(refraction, "100%", "#ffffff", "0.18");
      defs.appendChild(refraction);

      return { baseId, shineId, edgeId, refractionId };
    }

    function renderDonut(svgId, items, valueGetter, selectedIndex, selectFn, centerRenderer) {
      const svg = $(svgId);
      const total = items.reduce((sum, item) => sum + Math.max(0, Number(valueGetter(item))), 0);
      svg.innerHTML = "";
      const defs = svgEl("defs");
      svg.appendChild(defs);
      const glassFilterId = addGlassFilter(defs, svgId);

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "152",
        fill: "none",
        stroke: "rgba(255,255,255,0.11)",
        "stroke-width": "34",
        class: "donut-glass"
      }));

      let angle = 0;
      const slices = svgEl("g");

      items.forEach((item, index) => {
        const value = Math.max(0, Number(valueGetter(item)));
        const end = angle + (total ? value / total * 360 : 0);
        const color = state.colors[index % state.colors.length];
        const d = donutPath(180, 180, 154, 92, angle, end);
        const gradients = addSliceGradients(defs, svgId, index, color);
        const group = svgEl("g", {
          class: [
            "slice-group",
            index === selectedIndex ? "active" : "",
            index !== selectedIndex ? "dim" : ""
          ].join(" ").trim(),
          tabindex: "0",
          filter: `url(#${glassFilterId})`
        });
        group.dataset.index = String(index);

        group.appendChild(svgEl("path", {
          d,
          fill: `url(#${gradients.baseId})`,
          stroke: "rgba(255,255,255,0.2)",
          "stroke-width": "1.2",
          "stroke-linejoin": "round",
          class: "slice-base"
        }));

        group.appendChild(svgEl("path", {
          d,
          fill: `url(#${gradients.shineId})`,
          class: "slice-shine"
        }));

        group.appendChild(svgEl("path", {
          d,
          fill: "none",
          stroke: `url(#${gradients.refractionId})`,
          "stroke-width": "7",
          "stroke-linejoin": "round",
          class: "slice-refraction"
        }));

        group.appendChild(svgEl("path", {
          d,
          fill: "none",
          stroke: `url(#${gradients.edgeId})`,
          "stroke-width": "1.1",
          "stroke-linejoin": "round",
          class: "slice-edge"
        }));

        group.addEventListener("mouseenter", () => selectFn(index));
        group.addEventListener("click", () => selectFn(index));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectFn(index);
          }
        });

        slices.appendChild(group);
        angle = end;
      });

      svg.appendChild(slices);

      svg.appendChild(svgEl("path", {
        d: donutPath(180, 180, 154, 92, 304, 418),
        fill: "rgba(255,255,255,0.105)",
        class: "donut-sheen"
      }));

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "154",
        fill: "none",
        stroke: "rgba(255,255,255,0.14)",
        "stroke-width": "1"
      }));

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "92",
        fill: "none",
        stroke: "rgba(255,255,255,0.12)",
        "stroke-width": "1",
        class: "donut-glass"
      }));

      const center = svgEl("g", {
        "text-anchor": "middle",
        "dominant-baseline": "middle"
      });

      center.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "78",
        fill: "rgba(255,255,255,0.055)",
        stroke: "rgba(255,255,255,0.18)",
        "stroke-width": "1",
        class: "donut-glass"
      }));

      center.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "66",
        fill: "rgba(8,12,12,0.78)",
        stroke: "rgba(255,255,255,0.22)",
        "stroke-width": "1.2",
        class: "donut-glass"
      }));

      centerRenderer(center);
      svg.appendChild(center);
    }

    function addSvgText(parent, text, attrs) {
      const nextAttrs = {
        ...attrs,
        class: ["center-copy", attrs.class || ""].join(" ").trim()
      };
      const el = svgEl("text", nextAttrs);
      el.textContent = text;
      parent.appendChild(el);
    }

    function setSvgText(id, text, attrs = {}) {
      const el = $(id);
      if (!el) return;
      el.textContent = text;
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
    }

    function animateCenter(svgId, updateFn) {
      const svg = $(svgId);
      if (!svg) {
        updateFn();
        return;
      }

      window.clearTimeout(animateCenter.timers[svgId]);
      svg.classList.add("center-changing");
      animateCenter.timers[svgId] = window.setTimeout(() => {
        updateFn();
        window.requestAnimationFrame(() => svg.classList.remove("center-changing"));
      }, 90);
    }

    animateCenter.timers = {};

    function updateDonutSelection(svgId, selectedIndex) {
      const svg = $(svgId);
      if (!svg) return;

      svg.querySelectorAll(".slice-group").forEach((slice) => {
        const active = Number(slice.dataset.index) === selectedIndex;
        slice.classList.toggle("active", active);
        slice.classList.toggle("dim", !active);
      });
    }

    function updateRowSelection(listId, rowSelector, selectedIndex) {
      const list = $(listId);
      if (!list) return;

      list.querySelectorAll(rowSelector).forEach((row) => {
        row.classList.toggle("active", Number(row.dataset.index) === selectedIndex);
      });
    }

    function renderHoldingsChart() {
      const holdings = state.data.holdings;
      const selected = holdings[state.selectedHolding];

      renderDonut(
        "holdingsChart",
        holdings,
        (item) => item.value,
        state.selectedHolding,
        selectHolding,
        (center) => {
          addSvgText(center, selected.ticker, {
            id: "holdingsChartTitle",
            x: "180",
            y: "148",
            fill: "rgba(255,255,255,0.96)",
            "font-size": "24",
            "font-weight": "840",
            "letter-spacing": "0"
          });
          addSvgText(center, centerLabel(selected.nameZh || selected.name || ""), {
            id: "holdingsChartSubtitle",
            x: "180",
            y: "172",
            fill: "rgba(255,255,255,0.62)",
            "font-size": "11",
            "font-weight": "500"
          });
          addSvgText(center, formatPct(selected.weight), {
            id: "holdingsChartPct",
            x: "180",
            y: "202",
            fill: "rgba(255,255,255,0.96)",
            "font-size": "23",
            "font-weight": "840",
            "letter-spacing": "0"
          });
          addSvgText(center, formatCurrency(selected.value), {
            id: "holdingsChartValue",
            x: "180",
            y: "226",
            fill: "rgba(255,255,255,0.62)",
            "font-size": "11",
            "font-weight": "500"
          });
        }
      );
    }

    function renderGainChart() {
      const items = state.data.performance.items;
      const selected = items[state.selectedPerformance];

      renderDonut(
        "gainChart",
        items,
        (item) => Math.abs(item.gain),
        state.selectedPerformance,
        selectPerformance,
        (center) => {
          addSvgText(center, centerLabel(selected.label, 10), {
            id: "gainChartTitle",
            x: "180",
            y: "150",
            fill: "rgba(255,255,255,0.96)",
            "font-size": "14",
            "font-weight": "760"
          });
          addSvgText(center, formatSignedCurrency(selected.gain), {
            id: "gainChartValue",
            x: "180",
            y: "184",
            fill: selected.gain >= 0 ? "#8ef6bf" : "#ff9aaa",
            "font-size": "22",
            "font-weight": "840",
            "letter-spacing": "0"
          });
          addSvgText(center, formatSignedPct(selected.returnPct), {
            id: "gainChartPct",
            x: "180",
            y: "215",
            fill: "rgba(255,255,255,0.62)",
            "font-size": "13",
            "font-weight": "600"
          });
        }
      );
    }

    function updateHoldingSelection(animate = true) {
      const selected = state.data.holdings[state.selectedHolding];
      updateDonutSelection("holdingsChart", state.selectedHolding, animate);
      updateRowSelection("holdingList", ".holding", state.selectedHolding);

      const updateCenter = () => {
        setSvgText("holdingsChartTitle", selected.ticker);
        setSvgText("holdingsChartSubtitle", centerLabel(selected.nameZh || selected.name || ""));
        setSvgText("holdingsChartPct", formatPct(selected.weight));
        setSvgText("holdingsChartValue", formatCurrency(selected.value));
      };

      if (animate) {
        animateCenter("holdingsChart", updateCenter);
      } else {
        updateCenter();
      }
    }

    function updatePerformanceSelection(animate = true) {
      const selected = state.data.performance.items[state.selectedPerformance];
      updateDonutSelection("gainChart", state.selectedPerformance, animate);
      updateRowSelection("performanceList", ".perf-row", state.selectedPerformance);

      const updateCenter = () => {
        setSvgText("gainChartTitle", centerLabel(selected.label, 10));
        setSvgText("gainChartValue", formatSignedCurrency(selected.gain), {
          fill: selected.gain >= 0 ? "#8ef6bf" : "#ff9aaa"
        });
        setSvgText("gainChartPct", formatSignedPct(selected.returnPct));
      };

      if (animate) {
        animateCenter("gainChart", updateCenter);
      } else {
        updateCenter();
      }
    }

    function selectHolding(index) {
      if (state.selectedHolding === index) return;
      state.selectedHolding = index;
      updateHoldingSelection(true);
    }

    function selectPerformance(index) {
      if (state.selectedPerformance === index) return;
      state.selectedPerformance = index;
      updatePerformanceSelection(true);
    }

    function renderHoldingList() {
      const list = $("holdingList");
      list.innerHTML = "";

      state.data.holdings.forEach((item, index) => {
        const accent = state.colors[index % state.colors.length];
        const row = document.createElement("div");
        row.className = `holding ${index === state.selectedHolding ? "active" : ""}`;
        row.dataset.index = String(index);
        row.style.setProperty("--accent", accent);
        row.innerHTML = `
          <div class="swatch" style="background:linear-gradient(180deg, rgba(255,255,255,0.9), ${accent})"></div>
          <div class="holding-main">
            <div class="ticker-line">
              <span class="ticker">${escapeHtml(item.ticker)}</span>
              <span class="kind">${escapeHtml(item.type || "持仓")}</span>
            </div>
            <div class="zh">${escapeHtml(item.nameZh || item.name || "")}</div>
          </div>
          <div class="holding-side">
            <div class="pct">${formatPct(item.weight)}</div>
            <div class="val">${formatCurrency(item.value)}</div>
          </div>
        `;

        row.addEventListener("mouseenter", () => selectHolding(index));
        row.addEventListener("click", () => selectHolding(index));

        list.appendChild(row);
      });
    }

    function renderPerformanceList() {
      const list = $("performanceList");
      const items = state.data.performance.items;
      list.innerHTML = "";

      items.forEach((item, index) => {
        const accent = state.colors[index % state.colors.length];
        const row = document.createElement("div");
        row.className = `perf-row ${index === state.selectedPerformance ? "active" : ""}`;
        row.dataset.index = String(index);
        row.style.setProperty("--accent", accent);
        const gainShare = item.currentValue ? Math.abs(item.gain) / Math.abs(item.currentValue) * 100 : 0;
        const pct = item.gain === 0 ? 0 : Math.max(4, Math.min(100, gainShare));
        row.innerHTML = `
          <div class="perf-row-top">
            <div class="perf-name">${escapeHtml(item.label)}</div>
            <div class="gain ${item.gain < 0 ? "negative" : ""}">${formatSignedCurrency(item.gain)}</div>
          </div>
          <div class="perf-row-bottom">
            <span>本金 ${formatCurrency(item.principal)}</span>
            <span>当前 ${formatCurrency(item.currentValue)} · ${formatSignedPct(item.returnPct)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${item.gain < 0 ? "negative" : ""}" style="width:${pct}%; --accent:${accent}"></div></div>
        `;

        row.addEventListener("mouseenter", () => selectPerformance(index));
        row.addEventListener("click", () => selectPerformance(index));

        list.appendChild(row);
      });
    }

    function numericOrNull(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function holdingGain(item) {
      const explicitGain = numericOrNull(item.unrealizedGain);
      if (explicitGain !== null) return explicitGain;

      const value = numericOrNull(item.value);
      const costBasis = numericOrNull(item.costBasis);
      if (value === null || costBasis === null) return null;

      return value - costBasis;
    }

    function holdingReturnPct(item, gain) {
      const explicitPct = numericOrNull(item.unrealizedReturnPct);
      if (explicitPct !== null) return explicitPct;

      const costBasis = numericOrNull(item.costBasis);
      if (!costBasis) return null;

      return gain / costBasis * 100;
    }

    function renderRanking() {
      const list = $("rankList");
      const ranked = [...state.data.holdings]
        .map((item) => {
          const gain = holdingGain(item);
          const returnPct = gain === null ? null : holdingReturnPct(item, gain);
          return { ...item, computedGain: gain, computedReturnPct: returnPct };
        })
        .filter((item) => item.computedGain !== null)
        .sort((a, b) => b.computedGain - a.computedGain);

      list.innerHTML = "";

      if (!ranked.length) {
        const empty = document.createElement("div");
        empty.className = "rank-row";
        empty.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">暂无浮盈明细</div>
            <div class="rank-sub">缺少成本基础数据时不会显示该模块</div>
          </div>
        `;
        list.appendChild(empty);
        return;
      }

      ranked.forEach((item) => {
        const row = document.createElement("div");
        row.className = "rank-row";
        row.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">${escapeHtml(item.ticker)} ${escapeHtml(item.nameZh || "")}</div>
            <div class="rank-sub">成本 ${formatCurrency(item.costBasis)} · 当前 ${formatCurrency(item.value)}</div>
          </div>
          <div class="rank-gain">
            <div class="gain ${item.computedGain < 0 ? "negative" : ""}">${formatSignedCurrency(item.computedGain)}</div>
            <div class="val">${item.computedReturnPct === null ? "–" : formatSignedPct(item.computedReturnPct)}</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function renderSummary() {
      const data = state.data;
      const holdings = data.holdings;
      const largest = holdings[0];
      const perf = data.performance;

      $("meta").textContent = `${data.asOf || "latest"} · ${data.currency || "USD"} · CD + 股票 / ETF`;
      $("largestHolding").textContent = `${largest.ticker} ${formatPct(largest.weight)}`;
      $("holdingCount").textContent = `${holdings.length} 个`;

      $("totalGain").textContent = formatSignedCurrency(perf.totalGain);
      $("totalGain").className = `metric-value gain ${perf.totalGain < 0 ? "negative" : ""}`;
      $("totalGainSub").textContent = `本金 ${formatCurrency(perf.totalPrincipal)}，当前 ${formatCurrency(perf.totalCurrentValue)}`;
      $("totalReturn").textContent = formatSignedPct(perf.totalReturnPct);
      $("totalReturn").className = `metric-value gain ${perf.totalReturnPct < 0 ? "negative" : ""}`;
      $("totalCurrent").textContent = formatCurrency(perf.totalCurrentValue);
      $("totalPrincipal").textContent = formatCurrency(perf.totalPrincipal);
      $("gainSourceCount").textContent = `${perf.items.length} 类`;
      $("perfDate").textContent = data.asOf || "latest";
    }

    function switchTab(tab) {
      state.activeTab = tab;
      $("tabs").dataset.active = tab;
      $("holdingsTab").classList.toggle("active", tab === "holdings");
      $("performanceTab").classList.toggle("active", tab === "performance");
      $("holdingsTab").setAttribute("aria-selected", tab === "holdings" ? "true" : "false");
      $("performanceTab").setAttribute("aria-selected", tab === "performance" ? "true" : "false");

      const activePanel = tab === "holdings" ? $("holdingsPanel") : $("performancePanel");
      const inactivePanel = tab === "holdings" ? $("performancePanel") : $("holdingsPanel");
      if (activePanel.classList.contains("active") && activePanel.classList.contains("panel-ready") && !inactivePanel.classList.contains("active")) {
        return;
      }

      inactivePanel.classList.remove("panel-ready", "active");
      activePanel.classList.add("active");
      activePanel.classList.remove("panel-ready");
      window.requestAnimationFrame(() => activePanel.classList.add("panel-ready"));
    }

    function render() {
      renderSummary();
      renderHoldingsChart();
      renderHoldingList();
      renderGainChart();
      renderPerformanceList();
      renderRanking();
      updateHoldingSelection(false);
      updatePerformanceSelection(false);
      switchTab(state.activeTab);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("unlockBtn").addEventListener("click", unlock);
    $("refreshBtn").addEventListener("click", refreshData);
    $("lockBtn").addEventListener("click", lockPage);

    $("holdingsTab").addEventListener("click", () => switchTab("holdings"));
    $("performanceTab").addEventListener("click", () => switchTab("performance"));

    $("passwordInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
    });

    window.addEventListener("load", () => {
      if (PREVIEW_MODE && EMBEDDED_DATA) {
        activateData(EMBEDDED_DATA);
        showToast("预览模式");
      } else {
        $("passwordInput").focus();
      }
    });
  </script>
</body>
</html>
