<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>持仓与收益</title>
  <style>
    :root {
      --bg0: #070a12;
      --bg1: #0b1020;
      --line: rgba(255, 255, 255, 0.16);
      --line-strong: rgba(255, 255, 255, 0.26);
      --text: rgba(255, 255, 255, 0.94);
      --muted: rgba(255, 255, 255, 0.62);
      --soft: rgba(255, 255, 255, 0.42);
      --danger: #fca5a5;
      --good: #86efac;
      --warn: #fde68a;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 16% 10%, rgba(125, 211, 252, 0.25), transparent 32%),
        radial-gradient(circle at 92% 16%, rgba(167, 139, 250, 0.22), transparent 34%),
        radial-gradient(circle at 50% 95%, rgba(52, 211, 153, 0.12), transparent 36%),
        linear-gradient(145deg, var(--bg0), var(--bg1));
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Text",
        "Segoe UI",
        "PingFang SC",
        "Hiragino Sans GB",
        "Microsoft YaHei",
        sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .shell {
      width: min(1180px, calc(100vw - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 44px 0 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .glass {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 8px);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.06)),
        rgba(255, 255, 255, 0.04);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      overflow: hidden;
      position: relative;
    }

    .glass::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.10), transparent 24%, transparent 76%, rgba(255, 255, 255, 0.08)),
        radial-gradient(circle at 30% 0%, rgba(255, 255, 255, 0.18), transparent 34%);
      opacity: 0.72;
    }

    .lock,
    .dashboard {
      position: relative;
      z-index: 1;
    }

    .lock {
      min-height: 680px;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .lock-card {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 34px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.26);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.06);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #34d399;
      box-shadow: 0 0 20px rgba(52, 211, 153, 0.9);
    }

    h1 {
      margin: 22px 0 10px;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.04;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }

    .input-row {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    input {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      outline: none;
      border-radius: 18px;
      padding: 16px 16px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      font-size: 16px;
    }

    input::placeholder {
      color: var(--soft);
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 15px 18px;
      color: #08111f;
      background: linear-gradient(135deg, #e0f2fe, #93c5fd);
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 14px 34px rgba(96, 165, 250, 0.22);
    }

    button.secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .error {
      min-height: 24px;
      margin-top: 14px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.55;
    }

    .dashboard {
      display: none;
      padding: 36px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .title-block h2 {
      margin: 10px 0 8px;
      font-size: clamp(32px, 4.8vw, 58px);
      letter-spacing: -0.055em;
      line-height: 1.02;
    }

    .meta {
      color: var(--muted);
      font-size: 15px;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-top: 4px;
    }

    .tabs {
      display: inline-flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.065);
      margin-bottom: 20px;
    }

    .tab {
      color: var(--muted);
      border: 0;
      border-radius: 999px;
      padding: 11px 18px;
      background: transparent;
      box-shadow: none;
    }

    .tab.active {
      color: #08111f;
      background: linear-gradient(135deg, #e0f2fe, #93c5fd);
      box-shadow: 0 12px 30px rgba(96, 165, 250, 0.18);
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 24px;
      align-items: stretch;
    }

    .chart-card,
    .list-card,
    .metric-card,
    .perf-card,
    .ranking-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.07);
      overflow: hidden;
    }

    .chart-card {
      min-height: 660px;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 22px;
    }

    .chart-wrap {
      position: relative;
      min-height: 530px;
      display: grid;
      place-items: center;
    }

    svg {
      width: min(100%, 560px);
      height: auto;
      display: block;
      overflow: visible;
    }

    .slice {
      transition: transform 180ms ease, opacity 180ms ease, filter 180ms ease;
      cursor: pointer;
      transform-origin: 180px 180px;
    }

    .slice:hover,
    .slice.active {
      transform: scale(1.026);
      filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.26));
    }

    .slice.dim {
      opacity: 0.38;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 8px;
    }

    .summary-item {
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.06);
    }

    .summary-label {
      color: var(--muted);
      font-size: 13px;
    }

    .summary-value {
      margin-top: 6px;
      font-size: 20px;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .list-card {
      padding: 18px;
    }

    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 4px 14px;
      gap: 14px;
    }

    .list-head strong {
      font-size: 22px;
      letter-spacing: -0.04em;
    }

    .list-head span {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .holding-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .holding {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 20px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.055);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .holding:hover,
    .holding.active {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
      background: rgba(255, 255, 255, 0.105);
    }

    .swatch {
      width: 13px;
      height: 42px;
      border-radius: 999px;
    }

    .holding-main {
      min-width: 0;
    }

    .ticker-line {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .ticker {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.045em;
    }

    .kind {
      color: var(--muted);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.075);
      border: 1px solid rgba(255, 255, 255, 0.10);
    }

    .zh {
      margin-top: 3px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .holding-side {
      text-align: right;
    }

    .pct {
      font-size: 17px;
      font-weight: 850;
      letter-spacing: -0.035em;
    }

    .val {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    .metric-card {
      padding: 20px;
      min-height: 132px;
      background:
        radial-gradient(circle at 20% 0%, rgba(125, 211, 252, 0.13), transparent 42%),
        rgba(255, 255, 255, 0.07);
    }

    .metric-card.primary {
      background:
        radial-gradient(circle at 18% 0%, rgba(134, 239, 172, 0.2), transparent 44%),
        rgba(255, 255, 255, 0.08);
    }

    .metric-label {
      color: var(--muted);
      font-size: 13px;
    }

    .metric-value {
      margin-top: 12px;
      font-size: clamp(26px, 3.4vw, 40px);
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
    }

    .metric-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .performance-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
      align-items: stretch;
    }

    .perf-card {
      padding: 18px;
    }

    .perf-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .perf-row {
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 22px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.055);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .perf-row.active,
    .perf-row:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.105);
    }

    .perf-row-top,
    .perf-row-bottom {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
    }

    .perf-name {
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .gain {
      color: var(--good);
      font-weight: 900;
      letter-spacing: -0.045em;
    }

    .gain.negative {
      color: var(--danger);
    }

    .perf-row-bottom {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      margin-top: 14px;
      background: rgba(255, 255, 255, 0.10);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #60a5fa, #34d399);
      min-width: 4px;
    }

    .ranking-card {
      margin-top: 24px;
      padding: 18px;
    }

    .rank-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .rank-row {
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 18px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.055);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .rank-main {
      min-width: 0;
    }

    .rank-title {
      font-weight: 850;
      letter-spacing: -0.04em;
    }

    .rank-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .rank-gain {
      text-align: right;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      max-width: calc(100vw - 28px);
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(10, 15, 28, 0.88);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.36);
      color: var(--text);
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (max-width: 960px) {
      .shell {
        width: min(100vw - 20px, 680px);
        padding: 14px 0 28px;
      }

      .dashboard {
        padding: 18px;
      }

      .topbar {
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .actions button {
        flex: 1;
      }

      .main-grid,
      .performance-grid,
      .metric-grid {
        grid-template-columns: 1fr;
      }

      .chart-card {
        min-height: 570px;
      }

      .chart-wrap {
        min-height: 450px;
      }

      svg {
        width: min(100%, 500px);
      }

      .summary-strip {
        grid-template-columns: 1fr;
      }

      .lock {
        min-height: 640px;
        padding: 18px;
      }

      .lock-card {
        padding: 24px;
      }

      .input-row {
        flex-direction: column;
      }

      .rank-list {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 430px) {
      .dashboard {
        padding: 14px;
      }

      .chart-card,
      .list-card,
      .perf-card,
      .metric-card,
      .ranking-card {
        border-radius: 24px;
      }

      .chart-card {
        padding: 14px;
        min-height: 500px;
      }

      .chart-wrap {
        min-height: 390px;
      }

      svg {
        width: min(100%, 390px);
      }

      .holding {
        grid-template-columns: auto 1fr;
      }

      .holding-side {
        grid-column: 2;
        text-align: left;
        display: flex;
        gap: 10px;
        align-items: baseline;
      }

      .tabs {
        width: 100%;
      }

      .tab {
        flex: 1;
      }
    }

    @media (max-width: 360px) {
      .chart-card {
        min-height: 460px;
      }

      .chart-wrap {
        min-height: 350px;
      }

      svg {
        width: min(100%, 340px);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="glass">
      <div id="lock" class="lock">
        <div class="lock-card">
          <h1>请输入密码</h1>
          <div class="input-row">
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入密码" />
            <button id="unlockBtn">进入</button>
          </div>
          <div id="lockError" class="error"></div>
        </div>
      </div>

      <div id="dashboard" class="dashboard">
        <div class="topbar">
          <div class="title-block">
            <div class="eyebrow"><span class="dot"></span> portfolio snapshot</div>
            <h2>当前投资概览</h2>
            <div id="meta" class="meta"></div>
          </div>
          <div class="actions">
            <button class="secondary" id="refreshBtn">刷新数据</button>
            <button class="secondary" id="lockBtn">锁定</button>
          </div>
        </div>

        <div class="tabs" role="tablist" aria-label="Dashboard tabs">
          <button class="tab active" id="holdingsTab">持仓</button>
          <button class="tab" id="performanceTab">收益</button>
        </div>

        <section id="holdingsPanel" class="panel active">
          <div class="main-grid">
            <section class="chart-card">
              <div class="chart-wrap">
                <svg id="holdingsChart" viewBox="0 0 360 360" role="img" aria-label="持仓饼图"></svg>
              </div>

              <div class="summary-strip">
                <div class="summary-item">
                  <div class="summary-label">股票 / ETF 市值</div>
                  <div id="equityValue" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">最大仓位</div>
                  <div id="largestHolding" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">持仓数</div>
                  <div id="holdingCount" class="summary-value"></div>
                </div>
              </div>
            </section>

            <section class="list-card">
              <div class="list-head">
                <strong>持仓明细</strong>
                <span>点击切换高亮</span>
              </div>
              <div id="holdingList" class="holding-list"></div>
            </section>
          </div>
        </section>

        <section id="performancePanel" class="panel">
          <div class="metric-grid">
            <div class="metric-card primary">
              <div class="metric-label">累计收益</div>
              <div id="totalGain" class="metric-value"></div>
              <div id="totalGainSub" class="metric-sub"></div>
            </div>
            <div class="metric-card">
              <div class="metric-label">累计收益率</div>
              <div id="totalReturn" class="metric-value"></div>
              <div class="metric-sub">基于场内资金本金与当前市值计算</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">当前展示资产</div>
              <div id="totalCurrent" class="metric-value"></div>
              <div class="metric-sub">美国银行 CD + 股票 / ETF</div>
            </div>
          </div>

          <div class="performance-grid">
            <section class="chart-card">
              <div class="chart-wrap">
                <svg id="gainChart" viewBox="0 0 360 360" role="img" aria-label="收益来源饼图"></svg>
              </div>
              <div class="summary-strip">
                <div class="summary-item">
                  <div class="summary-label">本金</div>
                  <div id="totalPrincipal" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">收益来源</div>
                  <div id="gainSourceCount" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">最新日期</div>
                  <div id="perfDate" class="summary-value"></div>
                </div>
              </div>
            </section>

            <section class="perf-card">
              <div class="list-head">
                <strong>收益明细</strong>
                <span>点击切换图表中心</span>
              </div>
              <div id="performanceList" class="perf-list"></div>
            </section>
          </div>

          <section class="ranking-card">
            <div class="list-head">
              <strong>股票 / ETF 浮盈</strong>
              <span>按持仓成本基础估算</span>
            </div>
            <div id="rankList" class="rank-list"></div>
          </section>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const EMBEDDED_DATA = null;
    const PREVIEW_MODE = false;

    const state = {
      password: "",
      data: null,
      selectedHolding: 0,
      selectedPerformance: 0,
      activeTab: "holdings",
      colors: [
        "#60a5fa",
        "#a78bfa",
        "#34d399",
        "#f59e0b",
        "#fb7185",
        "#22d3ee",
        "#f472b6",
        "#c084fc",
        "#93c5fd",
        "#86efac"
      ]
    };

    const $ = (id) => document.getElementById(id);

    const formatCurrency = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value || 0);
    };

    const formatCurrencyFull = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(value || 0);
    };

    const formatPct = (value) => `${(value || 0).toFixed(1)}%`;

    const formatSignedCurrency = (value) => {
      const abs = formatCurrency(Math.abs(value || 0));
      return `${value >= 0 ? "+" : "-"}${abs}`;
    };

    const formatSignedPct = (value) => `${value >= 0 ? "+" : ""}${(value || 0).toFixed(1)}%`;

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function base64ToBytes(base64) {
      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations,
          hash: "SHA-256"
        },
        material,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );
    }

    async function decryptPayload(encrypted, password) {
      const salt = base64ToBytes(encrypted.salt);
      const iv = base64ToBytes(encrypted.iv);
      const ciphertext = base64ToBytes(encrypted.ciphertext);
      const key = await deriveKey(password, salt, encrypted.iterations || 250000);

      const plaintext = await crypto.subtle.decrypt(
        {
          name: "AES-GCM",
          iv
        },
        key,
        ciphertext
      );

      const text = new TextDecoder().decode(plaintext);
      return JSON.parse(text);
    }

    async function fetchEncrypted() {
      const response = await fetch(`./data.enc.json?ts=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("无法读取 data.enc.json");
      }

      return response.json();
    }

    async function unlock() {
      const password = $("passwordInput").value.trim();
      const error = $("lockError");
      error.textContent = "";

      if (!password) {
        error.textContent = "请输入访问密码。";
        return;
      }

      $("unlockBtn").disabled = true;
      $("unlockBtn").textContent = "解密中";

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, password);
        state.password = password;
        activateData(data);
        showToast("已解锁");
      } catch (err) {
        error.textContent = "密码错误，或数据文件不可用。";
      } finally {
        $("unlockBtn").disabled = false;
        $("unlockBtn").textContent = "解锁";
      }
    }

    function activateData(data) {
      state.data = normalizeData(data);
      state.selectedHolding = 0;
      state.selectedPerformance = 0;

      $("lock").style.display = "none";
      $("dashboard").style.display = "block";
      render();
    }

    function normalizeData(data) {
      const holdings = [...data.holdings]
        .filter((item) => Number(item.value) > 0)
        .sort((a, b) => b.value - a.value);

      const total = holdings.reduce((sum, item) => sum + Number(item.value), 0);

      holdings.forEach((item) => {
        item.weight = Number(item.value) / total * 100;
      });

      return {
        ...data,
        equityValue: total,
        holdings
      };
    }

    async function refreshData() {
      if (PREVIEW_MODE) {
        activateData(EMBEDDED_DATA);
        showToast("预览数据已重新载入");
        return;
      }

      if (!state.password) return;

      $("refreshBtn").disabled = true;
      $("refreshBtn").textContent = "刷新中";

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, state.password);
        state.data = normalizeData(data);
        state.selectedHolding = Math.min(state.selectedHolding, state.data.holdings.length - 1);
        state.selectedPerformance = Math.min(state.selectedPerformance, state.data.performance.items.length - 1);
        render();
        showToast("数据已刷新");
      } catch (err) {
        showToast("刷新失败，请确认密码或数据文件");
      } finally {
        $("refreshBtn").disabled = false;
        $("refreshBtn").textContent = "刷新数据";
      }
    }

    function lockPage() {
      if (PREVIEW_MODE) {
        showToast("预览模式无需锁定");
        return;
      }

      state.password = "";
      state.data = null;
      state.selectedHolding = 0;
      $("passwordInput").value = "";
      $("dashboard").style.display = "none";
      $("lock").style.display = "grid";
      $("passwordInput").focus();
    }

    function polar(cx, cy, r, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle)
      };
    }

    function donutPath(cx, cy, outerR, innerR, startAngle, endAngle) {
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      const p1 = polar(cx, cy, outerR, startAngle);
      const p2 = polar(cx, cy, outerR, endAngle);
      const p3 = polar(cx, cy, innerR, endAngle);
      const p4 = polar(cx, cy, innerR, startAngle);

      return [
        `M ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`,
        `A ${outerR} ${outerR} 0 ${largeArc} 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)}`,
        `L ${p3.x.toFixed(3)} ${p3.y.toFixed(3)}`,
        `A ${innerR} ${innerR} 0 ${largeArc} 0 ${p4.x.toFixed(3)} ${p4.y.toFixed(3)}`,
        "Z"
      ].join(" ");
    }

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function centerLabel(value, max = 12) {
      const text = String(value || "");
      if (text.length <= max) return text;
      return `${text.slice(0, max - 1)}…`;
    }

    function renderDonut(svgId, items, valueGetter, selectedIndex, selectFn, centerRenderer) {
      const svg = $(svgId);
      const total = items.reduce((sum, item) => sum + Math.max(0, Number(valueGetter(item))), 0);
      svg.innerHTML = "";

      let angle = 0;

      items.forEach((item, index) => {
        const value = Math.max(0, Number(valueGetter(item)));
        const end = angle + (total ? value / total * 360 : 0);
        const path = svgEl("path", {
          d: donutPath(180, 180, 154, 92, angle, end),
          fill: state.colors[index % state.colors.length],
          class: [
            "slice",
            index === selectedIndex ? "active" : "",
            index !== selectedIndex ? "dim" : ""
          ].join(" ").trim()
        });

        path.addEventListener("mouseenter", () => selectFn(index));
        path.addEventListener("click", () => selectFn(index));

        svg.appendChild(path);
        angle = end;
      });

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "154",
        fill: "none",
        stroke: "rgba(255,255,255,0.14)",
        "stroke-width": "1"
      }));

      const center = svgEl("g", {
        "text-anchor": "middle",
        "dominant-baseline": "middle"
      });

      center.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "70",
        fill: "rgba(8,13,25,0.78)",
        stroke: "rgba(255,255,255,0.12)",
        "stroke-width": "1"
      }));

      centerRenderer(center);
      svg.appendChild(center);
    }

    function addSvgText(parent, text, attrs) {
      const el = svgEl("text", attrs);
      el.textContent = text;
      parent.appendChild(el);
    }

    function renderHoldingsChart() {
      const holdings = state.data.holdings;
      const selected = holdings[state.selectedHolding];

      renderDonut(
        "holdingsChart",
        holdings,
        (item) => item.value,
        state.selectedHolding,
        (index) => {
          state.selectedHolding = index;
          render();
        },
        (center) => {
          addSvgText(center, selected.ticker, {
            x: "180",
            y: "148",
            fill: "rgba(255,255,255,0.96)",
            "font-size": "26",
            "font-weight": "900",
            "letter-spacing": "-1"
          });
          addSvgText(center, centerLabel(selected.nameZh || selected.name || ""), {
            x: "180",
            y: "172",
            fill: "rgba(255,255,255,0.62)",
            "font-size": "11",
            "font-weight": "500"
          });
          addSvgText(center, formatPct(selected.weight), {
            x: "180",
            y: "202",
            fill: "rgba(255,255,255,0.96)",
            "font-size": "25",
            "font-weight": "900",
            "letter-spacing": "-1"
          });
          addSvgText(center, formatCurrency(selected.value), {
            x: "180",
            y: "226",
            fill: "rgba(255,255,255,0.62)",
            "font-size": "11",
            "font-weight": "500"
          });
        }
      );
    }

    function renderGainChart() {
      const items = state.data.performance.items;
      const selected = items[state.selectedPerformance];

      renderDonut(
        "gainChart",
        items,
        (item) => Math.abs(item.gain),
        state.selectedPerformance,
        (index) => {
          state.selectedPerformance = index;
          render();
        },
        (center) => {
          addSvgText(center, centerLabel(selected.label, 10), {
            x: "180",
            y: "150",
            fill: "rgba(255,255,255,0.96)",
            "font-size": "15",
            "font-weight": "800"
          });
          addSvgText(center, formatSignedCurrency(selected.gain), {
            x: "180",
            y: "184",
            fill: selected.gain >= 0 ? "#86efac" : "#fca5a5",
            "font-size": "24",
            "font-weight": "900",
            "letter-spacing": "-1"
          });
          addSvgText(center, formatSignedPct(selected.returnPct), {
            x: "180",
            y: "215",
            fill: "rgba(255,255,255,0.62)",
            "font-size": "13",
            "font-weight": "600"
          });
        }
      );
    }

    function renderHoldingList() {
      const list = $("holdingList");
      list.innerHTML = "";

      state.data.holdings.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = `holding ${index === state.selectedHolding ? "active" : ""}`;
        row.innerHTML = `
          <div class="swatch" style="background:${state.colors[index % state.colors.length]}"></div>
          <div class="holding-main">
            <div class="ticker-line">
              <span class="ticker">${escapeHtml(item.ticker)}</span>
              <span class="kind">${escapeHtml(item.type || "持仓")}</span>
            </div>
            <div class="zh">${escapeHtml(item.nameZh || item.name || "")}</div>
          </div>
          <div class="holding-side">
            <div class="pct">${formatPct(item.weight)}</div>
            <div class="val">${formatCurrency(item.value)}</div>
          </div>
        `;

        row.addEventListener("mouseenter", () => {
          state.selectedHolding = index;
          render();
        });

        row.addEventListener("click", () => {
          state.selectedHolding = index;
          render();
        });

        list.appendChild(row);
      });
    }

    function renderPerformanceList() {
      const list = $("performanceList");
      const items = state.data.performance.items;
      list.innerHTML = "";

      items.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = `perf-row ${index === state.selectedPerformance ? "active" : ""}`;
        const gainShare = item.currentValue ? Math.abs(item.gain) / Math.abs(item.currentValue) * 100 : 0;
        const pct = item.gain === 0 ? 0 : Math.max(4, Math.min(100, gainShare));
        row.innerHTML = `
          <div class="perf-row-top">
            <div class="perf-name">${escapeHtml(item.label)}</div>
            <div class="gain ${item.gain < 0 ? "negative" : ""}">${formatSignedCurrency(item.gain)}</div>
          </div>
          <div class="perf-row-bottom">
            <span>本金 ${formatCurrency(item.principal)}</span>
            <span>当前 ${formatCurrency(item.currentValue)} · ${formatSignedPct(item.returnPct)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${item.gain < 0 ? "negative" : ""}" style="width:${pct}%"></div></div>
        `;

        row.addEventListener("mouseenter", () => {
          state.selectedPerformance = index;
          render();
        });

        row.addEventListener("click", () => {
          state.selectedPerformance = index;
          render();
        });

        list.appendChild(row);
      });
    }

    function numericOrNull(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function holdingGain(item) {
      const explicitGain = numericOrNull(item.unrealizedGain);
      if (explicitGain !== null) return explicitGain;

      const value = numericOrNull(item.value);
      const costBasis = numericOrNull(item.costBasis);
      if (value === null || costBasis === null) return null;

      return value - costBasis;
    }

    function holdingReturnPct(item, gain) {
      const explicitPct = numericOrNull(item.unrealizedReturnPct);
      if (explicitPct !== null) return explicitPct;

      const costBasis = numericOrNull(item.costBasis);
      if (!costBasis) return null;

      return gain / costBasis * 100;
    }

    function renderRanking() {
      const list = $("rankList");
      const ranked = [...state.data.holdings]
        .map((item) => {
          const gain = holdingGain(item);
          const returnPct = gain === null ? null : holdingReturnPct(item, gain);
          return { ...item, computedGain: gain, computedReturnPct: returnPct };
        })
        .filter((item) => item.computedGain !== null)
        .sort((a, b) => b.computedGain - a.computedGain);

      list.innerHTML = "";

      if (!ranked.length) {
        const empty = document.createElement("div");
        empty.className = "rank-row";
        empty.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">暂无浮盈明细</div>
            <div class="rank-sub">缺少成本基础数据时不会显示该模块</div>
          </div>
        `;
        list.appendChild(empty);
        return;
      }

      ranked.forEach((item) => {
        const row = document.createElement("div");
        row.className = "rank-row";
        row.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">${escapeHtml(item.ticker)} ${escapeHtml(item.nameZh || "")}</div>
            <div class="rank-sub">成本 ${formatCurrency(item.costBasis)} · 当前 ${formatCurrency(item.value)}</div>
          </div>
          <div class="rank-gain">
            <div class="gain ${item.computedGain < 0 ? "negative" : ""}">${formatSignedCurrency(item.computedGain)}</div>
            <div class="val">${item.computedReturnPct === null ? "–" : formatSignedPct(item.computedReturnPct)}</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function renderSummary() {
      const data = state.data;
      const holdings = data.holdings;
      const largest = holdings[0];
      const perf = data.performance;

      $("meta").textContent = `${data.asOf || "latest"} · ${data.currency || "USD"} · CD + 股票 / ETF`;
      $("equityValue").textContent = formatCurrency(data.equityValue);
      $("largestHolding").textContent = `${largest.ticker} ${formatPct(largest.weight)}`;
      $("holdingCount").textContent = `${holdings.length} 个`;

      $("totalGain").textContent = formatSignedCurrency(perf.totalGain);
      $("totalGain").className = `metric-value gain ${perf.totalGain < 0 ? "negative" : ""}`;
      $("totalGainSub").textContent = `本金 ${formatCurrency(perf.totalPrincipal)}，当前 ${formatCurrency(perf.totalCurrentValue)}`;
      $("totalReturn").textContent = formatSignedPct(perf.totalReturnPct);
      $("totalReturn").className = `metric-value gain ${perf.totalReturnPct < 0 ? "negative" : ""}`;
      $("totalCurrent").textContent = formatCurrency(perf.totalCurrentValue);
      $("totalPrincipal").textContent = formatCurrency(perf.totalPrincipal);
      $("gainSourceCount").textContent = `${perf.items.length} 类`;
      $("perfDate").textContent = data.asOf || "latest";
    }

    function switchTab(tab) {
      state.activeTab = tab;
      $("holdingsTab").classList.toggle("active", tab === "holdings");
      $("performanceTab").classList.toggle("active", tab === "performance");
      $("holdingsPanel").classList.toggle("active", tab === "holdings");
      $("performancePanel").classList.toggle("active", tab === "performance");
    }

    function render() {
      renderSummary();
      renderHoldingsChart();
      renderHoldingList();
      renderGainChart();
      renderPerformanceList();
      renderRanking();
      switchTab(state.activeTab);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("unlockBtn").addEventListener("click", unlock);
    $("refreshBtn").addEventListener("click", refreshData);
    $("lockBtn").addEventListener("click", lockPage);

    $("holdingsTab").addEventListener("click", () => switchTab("holdings"));
    $("performanceTab").addEventListener("click", () => switchTab("performance"));

    $("passwordInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
    });

    window.addEventListener("load", () => {
      if (PREVIEW_MODE && EMBEDDED_DATA) {
        activateData(EMBEDDED_DATA);
        showToast("预览模式");
      } else {
        $("passwordInput").focus();
      }
    });
  </script>
</body>
</html>
