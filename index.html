<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>持仓与收益</title>
  <style>
    :root {
      --bg: #f7f8f4;
      --surface: #ffffff;
      --surface-soft: #f0f4ed;
      --surface-hover: #f6faf3;
      --text: #101511;
      --muted: #687066;
      --soft: #9aa29a;
      --line: #e3e9df;
      --line-strong: #ccd6c7;
      --good: #00c805;
      --good-dark: #008f2f;
      --danger: #ff5000;
      --shadow: 0 18px 44px rgba(22, 36, 25, 0.08);
      --card-radius: 8px;
      --pill-radius: 999px;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      overflow-x: hidden;
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "SF Pro Text",
        "Segoe UI",
        "PingFang SC",
        "Hiragino Sans GB",
        "Microsoft YaHei",
        sans-serif;
      font-variant-numeric: tabular-nums;
      text-rendering: geometricPrecision;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      min-height: 100svh;
      margin: 0 auto;
      padding: max(18px, env(safe-area-inset-top)) 0 max(28px, env(safe-area-inset-bottom));
      display: grid;
      place-items: center;
    }

    .glass {
      width: 100%;
      min-height: min(900px, calc(100svh - 42px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .lock {
      min-height: min(760px, calc(100svh - 42px));
      display: grid;
      place-items: center;
      padding: 28px;
      background: linear-gradient(180deg, #ffffff, #f7faf4);
    }

    .lock-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      padding: 32px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 2.4rem;
      line-height: 1.08;
      font-weight: 780;
      letter-spacing: 0;
    }

    .input-row {
      margin-top: 26px;
      display: flex;
      gap: 10px;
    }

    input {
      width: 100%;
      min-width: 0;
      height: 48px;
      border: 1px solid var(--line);
      outline: none;
      border-radius: var(--pill-radius);
      padding: 0 16px;
      color: var(--text);
      background: var(--surface-soft);
      font-size: 16px;
      font-weight: 520;
      transition: border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    input:focus {
      border-color: var(--good);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 200, 5, 0.12);
    }

    input::placeholder {
      color: var(--soft);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      border: 0;
      border-radius: var(--pill-radius);
      padding: 0 18px;
      color: #062208;
      background: var(--good);
      font-size: 15px;
      font-weight: 760;
      letter-spacing: 0;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 160ms var(--ease), background 160ms var(--ease), box-shadow 160ms var(--ease), opacity 160ms var(--ease);
    }

    button:hover {
      background: #00b905;
      box-shadow: 0 10px 24px rgba(0, 200, 5, 0.22);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0) scale(0.985);
    }

    button.secondary {
      color: var(--text);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      box-shadow: none;
    }

    button.secondary:hover {
      border-color: var(--line-strong);
      background: #eaf1e6;
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.58;
      cursor: not-allowed;
      transform: none;
    }

    .error {
      min-height: 24px;
      margin-top: 14px;
      color: var(--danger);
      font-size: 14px;
      line-height: 1.55;
    }

    .dashboard {
      display: none;
      padding: 30px;
      background: var(--surface);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 20px;
    }

    .title-block {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: var(--pill-radius);
      color: var(--good-dark);
      background: rgba(0, 200, 5, 0.1);
      font-size: 12px;
      font-weight: 720;
      letter-spacing: 0;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--good);
    }

    .title-block h2 {
      margin-top: 10px;
      font-size: 2.65rem;
      line-height: 1.05;
      font-weight: 760;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      padding-top: 2px;
    }

    .tabs {
      position: sticky;
      top: max(10px, env(safe-area-inset-top));
      z-index: 5;
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(112px, 1fr));
      gap: 4px;
      min-height: 48px;
      padding: 4px;
      border-radius: var(--pill-radius);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      margin-bottom: 18px;
      isolation: isolate;
    }

    .tabs::before {
      content: "";
      position: absolute;
      top: 4px;
      bottom: 4px;
      left: 4px;
      width: calc((100% - 12px) / 2);
      border-radius: var(--pill-radius);
      background: var(--surface);
      box-shadow: 0 4px 14px rgba(22, 36, 25, 0.1);
      transform: translateX(0);
      transition: transform 260ms var(--ease);
      pointer-events: none;
      z-index: 0;
    }

    .tabs[data-active="performance"]::before {
      transform: translateX(calc(100% + 4px));
    }

    .tab {
      min-height: 38px;
      color: var(--muted);
      border: 0;
      border-radius: var(--pill-radius);
      padding: 0 18px;
      background: transparent;
      box-shadow: none;
      font-weight: 740;
      transition: color 180ms var(--ease), transform 180ms var(--ease);
      position: relative;
      z-index: 1;
    }

    .tab:hover {
      transform: none;
      box-shadow: none;
      color: var(--text);
      background: transparent;
    }

    .tab.active {
      color: var(--text);
    }

    .panel {
      display: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 220ms var(--ease), transform 220ms var(--ease);
    }

    .panel.active {
      display: block;
    }

    .panel.active.panel-ready {
      opacity: 1;
      transform: translateY(0);
    }

    .main-grid,
    .performance-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 0.86fr);
      gap: 18px;
      align-items: stretch;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .chart-card,
    .list-card,
    .metric-card,
    .perf-card,
    .ranking-card,
    .summary-item {
      border: 1px solid var(--line);
      border-radius: var(--card-radius);
      background: var(--surface);
    }

    .chart-card {
      min-height: 610px;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 20px;
    }

    .chart-wrap {
      min-height: 470px;
      display: grid;
      place-items: center;
    }

    svg {
      width: min(100%, 500px);
      height: auto;
      display: block;
      overflow: visible;
    }

    .slice-group {
      cursor: pointer;
      transform-origin: 180px 180px;
      transition: transform 240ms var(--ease), opacity 180ms var(--ease), filter 180ms var(--ease);
    }

    .slice-group:hover,
    .slice-group.active {
      transform: scale(1.014);
      filter: drop-shadow(0 8px 14px rgba(21, 34, 22, 0.12)) saturate(1.08);
      opacity: 1;
    }

    .slice-group.dim {
      opacity: 0.68;
    }

    .center-copy {
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 140ms var(--ease), transform 180ms var(--ease);
    }

    svg.center-changing .center-copy {
      opacity: 0;
      transform: translateY(4px);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .summary-strip.holdings-summary {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .summary-item {
      min-width: 0;
      padding: 14px;
      background: var(--surface-soft);
    }

    .metric-label,
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .summary-value {
      margin-top: 7px;
      font-size: 1.05rem;
      font-weight: 760;
      letter-spacing: 0;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .list-card,
    .perf-card,
    .ranking-card {
      padding: 16px;
    }

    .list-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 2px 2px 14px;
      gap: 14px;
    }

    .list-head strong {
      font-size: 1.12rem;
      font-weight: 760;
      letter-spacing: 0;
    }

    .list-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    .holding-list,
    .perf-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .holding,
    .perf-row,
    .rank-row {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      border-radius: var(--card-radius);
      background: var(--surface);
      cursor: pointer;
      transition: transform 180ms var(--ease), border-color 180ms var(--ease), background 180ms var(--ease), box-shadow 180ms var(--ease);
    }

    .holding::before,
    .perf-row::before {
      content: "";
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 0;
      width: 3px;
      border-radius: 0 999px 999px 0;
      background: var(--accent, var(--good));
      opacity: 0;
      transform: scaleY(0.4);
      transform-origin: center;
      transition: opacity 180ms var(--ease), transform 220ms var(--ease);
    }

    .holding > *,
    .perf-row > * {
      position: relative;
    }

    .holding {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
    }

    .holding:hover,
    .holding.active,
    .perf-row.active,
    .perf-row:hover,
    .rank-row:hover {
      transform: translateY(-1px);
      border-color: var(--line);
      background: var(--surface-hover);
      box-shadow: 0 8px 20px rgba(22, 36, 25, 0.06);
    }

    .holding.active,
    .perf-row.active {
      border-color: rgba(0, 200, 5, 0.2);
      background: linear-gradient(90deg, var(--accent-soft, rgba(0, 200, 5, 0.08)), #ffffff 44%);
    }

    .holding:hover::before,
    .holding.active::before,
    .perf-row:hover::before,
    .perf-row.active::before {
      opacity: 1;
      transform: scaleY(1);
    }

    .swatch {
      width: 8px;
      height: 34px;
      border-radius: var(--pill-radius);
      box-shadow: inset 0 0 0 1px rgba(16, 21, 17, 0.1);
    }

    .holding-main,
    .rank-main {
      min-width: 0;
    }

    .ticker-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .ticker,
    .perf-name,
    .rank-title {
      font-weight: 760;
      letter-spacing: 0;
    }

    .ticker {
      font-size: 1rem;
    }

    .kind {
      color: var(--muted);
      font-size: 12px;
      padding: 3px 8px;
      border-radius: var(--pill-radius);
      background: var(--surface-soft);
      white-space: nowrap;
    }

    .zh {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .holding-side {
      text-align: right;
      min-width: max-content;
    }

    .pct {
      font-size: 0.98rem;
      font-weight: 760;
      letter-spacing: 0;
    }

    .val {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .metric-card {
      min-height: 126px;
      padding: 18px;
    }

    .metric-card.primary {
      background: #eefbea;
      border-color: rgba(0, 200, 5, 0.22);
    }

    .metric-value {
      margin-top: 12px;
      font-size: 1.9rem;
      font-weight: 780;
      letter-spacing: 0;
      line-height: 1.08;
      overflow-wrap: anywhere;
    }

    .metric-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .perf-row {
      padding: 14px;
    }

    .perf-row-top,
    .perf-row-bottom {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
    }

    .perf-name {
      font-size: 1rem;
      min-width: 0;
    }

    .gain {
      color: var(--good-dark);
      font-weight: 780;
      letter-spacing: 0;
    }

    .gain.negative {
      color: var(--danger);
    }

    .perf-row-bottom {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .bar-track {
      height: 8px;
      border-radius: var(--pill-radius);
      margin-top: 12px;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: var(--pill-radius);
      background: var(--accent, var(--good));
      min-width: 4px;
      transition: width 260ms var(--ease), background 180ms var(--ease);
    }

    .bar-fill.negative {
      background: var(--danger);
    }

    .ranking-card {
      margin-top: 18px;
    }

    .rank-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px;
      cursor: default;
      background: var(--surface-soft);
    }

    .rank-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    .rank-gain {
      text-align: right;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      max-width: calc(100% - 28px);
      padding: 12px 14px;
      border-radius: var(--pill-radius);
      background: #101511;
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms var(--ease), transform 180ms var(--ease);
      z-index: 20;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-4px);
    }

    @media (max-width: 1080px) {
      .main-grid,
      .performance-grid {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100%, 680px);
        padding: 10px;
        align-items: start;
      }

      .glass {
        min-height: calc(100svh - 20px);
        border-radius: 14px;
      }

      .dashboard {
        padding: 16px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        width: 100%;
      }

      .actions button {
        flex: 1;
      }

      .metric-grid,
      .summary-strip {
        grid-template-columns: 1fr;
      }

      .title-block h2 {
        font-size: 2.2rem;
      }

      .metric-value {
        font-size: 1.7rem;
      }

      .tabs {
        width: 100%;
      }

      .chart-card {
        min-height: auto;
        padding: 14px;
      }

      .chart-wrap {
        min-height: 380px;
      }

      svg {
        width: min(100%, 410px);
      }

      .rank-list {
        grid-template-columns: 1fr;
      }

      .lock {
        min-height: calc(100svh - 20px);
        padding: 18px;
      }

      .lock-card {
        padding: 24px;
      }

      h1 {
        font-size: 2.15rem;
      }

      .input-row {
        flex-direction: column;
      }
    }

    @media (max-width: 430px) {
      .shell {
        width: 100%;
        padding: 0;
      }

      .glass {
        min-height: 100svh;
        border-radius: 0;
        border-left: 0;
        border-right: 0;
      }

      .dashboard {
        padding: max(12px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
      }

      .title-block h2 {
        font-size: 2rem;
      }

      .metric-card,
      .summary-item,
      .list-card,
      .perf-card,
      .ranking-card {
        padding: 14px;
      }

      .chart-wrap {
        min-height: 320px;
      }

      svg {
        width: min(100%, 330px);
      }

      .holding {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .holding-side {
        grid-column: 2;
        text-align: left;
        display: flex;
        gap: 10px;
        align-items: baseline;
        min-width: 0;
      }

      .perf-row-top,
      .perf-row-bottom {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .rank-row {
        align-items: flex-start;
        flex-direction: column;
      }

      .rank-gain {
        text-align: left;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="glass">
      <div id="lock" class="lock">
        <div class="lock-card">
          <h1>请输入密码</h1>
          <div class="input-row">
            <input id="passwordInput" type="password" autocomplete="current-password" placeholder="请输入密码" />
            <button id="unlockBtn">进入</button>
          </div>
          <div id="lockError" class="error"></div>
        </div>
      </div>

      <div id="dashboard" class="dashboard">
        <div class="topbar">
          <div class="title-block">
            <div class="eyebrow"><span class="dot"></span> 资产概览</div>
            <h2>当前投资概览</h2>
            <div id="meta" class="meta"></div>
          </div>
          <div class="actions">
            <button class="secondary" id="refreshBtn">刷新数据</button>
            <button class="secondary" id="lockBtn">锁定</button>
          </div>
        </div>

        <div id="tabs" class="tabs" role="tablist" aria-label="Dashboard tabs" data-active="holdings">
          <button class="tab active" id="holdingsTab" role="tab" aria-selected="true" aria-controls="holdingsPanel">持仓</button>
          <button class="tab" id="performanceTab" role="tab" aria-selected="false" aria-controls="performancePanel">收益</button>
        </div>

        <section id="holdingsPanel" class="panel active" role="tabpanel" aria-labelledby="holdingsTab">
          <div class="main-grid">
            <section class="chart-card">
              <div class="chart-wrap">
                <svg id="holdingsChart" viewBox="0 0 360 360" role="img" aria-label="持仓饼图"></svg>
              </div>

              <div class="summary-strip holdings-summary">
                <div class="summary-item">
                  <div class="summary-label">最大仓位</div>
                  <div id="largestHolding" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">持仓数</div>
                  <div id="holdingCount" class="summary-value"></div>
                </div>
              </div>
            </section>

            <section class="list-card">
              <div class="list-head">
                <strong>持仓明细</strong>
                <span>点击切换高亮</span>
              </div>
              <div id="holdingList" class="holding-list"></div>
            </section>
          </div>
        </section>

        <section id="performancePanel" class="panel" role="tabpanel" aria-labelledby="performanceTab">
          <div class="metric-grid">
            <div class="metric-card primary">
              <div class="metric-label">累计收益</div>
              <div id="totalGain" class="metric-value"></div>
              <div id="totalGainSub" class="metric-sub"></div>
            </div>
            <div class="metric-card">
              <div class="metric-label">累计收益率</div>
              <div id="totalReturn" class="metric-value"></div>
              <div class="metric-sub">基于场内资金本金与当前市值计算</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">当前展示资产</div>
              <div id="totalCurrent" class="metric-value"></div>
              <div class="metric-sub">美国银行 CD + 股票 / ETF</div>
            </div>
          </div>

          <div class="performance-grid">
            <section class="chart-card">
              <div class="chart-wrap">
                <svg id="gainChart" viewBox="0 0 360 360" role="img" aria-label="收益来源饼图"></svg>
              </div>
              <div class="summary-strip">
                <div class="summary-item">
                  <div class="summary-label">本金</div>
                  <div id="totalPrincipal" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">收益来源</div>
                  <div id="gainSourceCount" class="summary-value"></div>
                </div>
                <div class="summary-item">
                  <div class="summary-label">最新日期</div>
                  <div id="perfDate" class="summary-value"></div>
                </div>
              </div>
            </section>

            <section class="perf-card">
              <div class="list-head">
                <strong>收益明细</strong>
                <span>点击切换图表中心</span>
              </div>
              <div id="performanceList" class="perf-list"></div>
            </section>
          </div>

          <section class="ranking-card">
            <div class="list-head">
              <strong>股票 / ETF 浮盈</strong>
              <span>按持仓成本基础估算</span>
            </div>
            <div id="rankList" class="rank-list"></div>
          </section>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const EMBEDDED_DATA = null;
    const PREVIEW_MODE = false;

    const state = {
      password: "",
      data: null,
      selectedHolding: 0,
      selectedPerformance: 0,
      activeTab: "holdings",
      colors: [
        "#00c805",
        "#00a76f",
        "#2f80ed",
        "#f2c94c",
        "#ff5000",
        "#6d5dfc",
        "#00b8d9",
        "#8dc63f",
        "#f2994a",
        "#242a24"
      ]
    };

    const $ = (id) => document.getElementById(id);

    function setButtonLabel(id, text) {
      $(id).textContent = text;
    }

    const formatCurrency = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 0
      }).format(value || 0);
    };

    const formatCurrencyFull = (value) => {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(value || 0);
    };

    const formatPct = (value) => `${(value || 0).toFixed(1)}%`;

    const formatSignedCurrency = (value) => {
      const abs = formatCurrency(Math.abs(value || 0));
      return `${value >= 0 ? "+" : "-"}${abs}`;
    };

    const formatSignedPct = (value) => `${value >= 0 ? "+" : ""}${(value || 0).toFixed(1)}%`;

    function showToast(message) {
      const toast = $("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function base64ToBytes(base64) {
      const bin = atob(base64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    async function deriveKey(password, salt, iterations) {
      const material = await crypto.subtle.importKey(
        "raw",
        new TextEncoder().encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );

      return crypto.subtle.deriveKey(
        {
          name: "PBKDF2",
          salt,
          iterations,
          hash: "SHA-256"
        },
        material,
        {
          name: "AES-GCM",
          length: 256
        },
        false,
        ["decrypt"]
      );
    }

    async function decryptPayload(encrypted, password) {
      const salt = base64ToBytes(encrypted.salt);
      const iv = base64ToBytes(encrypted.iv);
      const ciphertext = base64ToBytes(encrypted.ciphertext);
      const key = await deriveKey(password, salt, encrypted.iterations || 250000);

      const plaintext = await crypto.subtle.decrypt(
        {
          name: "AES-GCM",
          iv
        },
        key,
        ciphertext
      );

      const text = new TextDecoder().decode(plaintext);
      return JSON.parse(text);
    }

    async function fetchEncrypted() {
      const response = await fetch(`./data.enc.json?ts=${Date.now()}`, {
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error("无法读取 data.enc.json");
      }

      return response.json();
    }

    async function unlock() {
      const password = $("passwordInput").value.trim();
      const error = $("lockError");
      error.textContent = "";

      if (!password) {
        error.textContent = "请输入访问密码。";
        return;
      }

      $("unlockBtn").disabled = true;
      setButtonLabel("unlockBtn", "解密中");

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, password);
        state.password = password;
        activateData(data);
        showToast("已解锁");
      } catch (err) {
        error.textContent = "密码错误，或数据文件不可用。";
      } finally {
        $("unlockBtn").disabled = false;
        setButtonLabel("unlockBtn", "解锁");
      }
    }

    function activateData(data) {
      state.data = normalizeData(data);
      state.selectedHolding = 0;
      state.selectedPerformance = 0;

      $("lock").style.display = "none";
      $("dashboard").style.display = "block";
      render();
    }

    function normalizeData(data) {
      const holdings = [...data.holdings]
        .filter((item) => Number(item.value) > 0)
        .sort((a, b) => b.value - a.value);

      const total = holdings.reduce((sum, item) => sum + Number(item.value), 0);

      holdings.forEach((item) => {
        item.weight = Number(item.value) / total * 100;
      });

      return {
        ...data,
        equityValue: total,
        holdings
      };
    }

    async function refreshData() {
      if (PREVIEW_MODE) {
        activateData(EMBEDDED_DATA);
        showToast("预览数据已重新载入");
        return;
      }

      if (!state.password) return;

      $("refreshBtn").disabled = true;
      setButtonLabel("refreshBtn", "刷新中");

      try {
        const encrypted = await fetchEncrypted();
        const data = await decryptPayload(encrypted, state.password);
        state.data = normalizeData(data);
        state.selectedHolding = Math.min(state.selectedHolding, state.data.holdings.length - 1);
        state.selectedPerformance = Math.min(state.selectedPerformance, state.data.performance.items.length - 1);
        render();
        showToast("数据已刷新");
      } catch (err) {
        showToast("刷新失败，请确认密码或数据文件");
      } finally {
        $("refreshBtn").disabled = false;
        setButtonLabel("refreshBtn", "刷新数据");
      }
    }

    function lockPage() {
      if (PREVIEW_MODE) {
        showToast("预览模式无需锁定");
        return;
      }

      state.password = "";
      state.data = null;
      state.selectedHolding = 0;
      $("passwordInput").value = "";
      $("dashboard").style.display = "none";
      $("lock").style.display = "grid";
      $("passwordInput").focus();
    }

    function polar(cx, cy, r, angleDeg) {
      const angle = (angleDeg - 90) * Math.PI / 180;
      return {
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle)
      };
    }

    function donutPath(cx, cy, outerR, innerR, startAngle, endAngle) {
      const largeArc = endAngle - startAngle > 180 ? 1 : 0;
      const p1 = polar(cx, cy, outerR, startAngle);
      const p2 = polar(cx, cy, outerR, endAngle);
      const p3 = polar(cx, cy, innerR, endAngle);
      const p4 = polar(cx, cy, innerR, startAngle);

      return [
        `M ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`,
        `A ${outerR} ${outerR} 0 ${largeArc} 1 ${p2.x.toFixed(3)} ${p2.y.toFixed(3)}`,
        `L ${p3.x.toFixed(3)} ${p3.y.toFixed(3)}`,
        `A ${innerR} ${innerR} 0 ${largeArc} 0 ${p4.x.toFixed(3)} ${p4.y.toFixed(3)}`,
        "Z"
      ].join(" ");
    }

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function centerLabel(value, max = 12) {
      const text = String(value || "");
      if (text.length <= max) return text;
      return `${text.slice(0, max - 1)}…`;
    }

    function hexToRgb(hex) {
      const normalized = String(hex).replace("#", "");
      if (normalized.length !== 6) return "0, 200, 5";
      return [
        parseInt(normalized.slice(0, 2), 16),
        parseInt(normalized.slice(2, 4), 16),
        parseInt(normalized.slice(4, 6), 16)
      ].join(", ");
    }

    function renderDonut(svgId, items, valueGetter, selectedIndex, selectFn, centerRenderer) {
      const svg = $(svgId);
      const total = items.reduce((sum, item) => sum + Math.max(0, Number(valueGetter(item))), 0);
      svg.innerHTML = "";

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "152",
        fill: "none",
        stroke: "#edf2ea",
        "stroke-width": "36"
      }));

      let angle = 0;
      const slices = svgEl("g");

      items.forEach((item, index) => {
        const value = Math.max(0, Number(valueGetter(item)));
        const end = angle + (total ? value / total * 360 : 0);
        const color = state.colors[index % state.colors.length];
        const path = svgEl("path", {
          d: donutPath(180, 180, 154, 92, angle, end),
          fill: color,
          stroke: "#ffffff",
          "stroke-width": "1.5",
          "stroke-linejoin": "round",
          class: [
            "slice-group",
            index === selectedIndex ? "active" : "",
            index !== selectedIndex ? "dim" : ""
          ].join(" ").trim(),
          tabindex: "0"
        });
        path.dataset.index = String(index);

        path.addEventListener("mouseenter", () => selectFn(index));
        path.addEventListener("click", () => selectFn(index));
        path.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            selectFn(index);
          }
        });

        slices.appendChild(path);
        angle = end;
      });

      svg.appendChild(slices);

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "154",
        fill: "none",
        stroke: "#e3e9df",
        "stroke-width": "1"
      }));

      svg.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "92",
        fill: "none",
        stroke: "#e3e9df",
        "stroke-width": "1"
      }));

      const center = svgEl("g", {
        "text-anchor": "middle",
        "dominant-baseline": "middle"
      });

      center.appendChild(svgEl("circle", {
        cx: "180",
        cy: "180",
        r: "68",
        fill: "#ffffff",
        stroke: "#e3e9df",
        "stroke-width": "1"
      }));

      centerRenderer(center);
      svg.appendChild(center);
    }

    function addSvgText(parent, text, attrs) {
      const nextAttrs = {
        ...attrs,
        class: ["center-copy", attrs.class || ""].join(" ").trim()
      };
      const el = svgEl("text", nextAttrs);
      el.textContent = text;
      parent.appendChild(el);
    }

    function setSvgText(id, text, attrs = {}) {
      const el = $(id);
      if (!el) return;
      el.textContent = text;
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
    }

    function animateCenter(svgId, updateFn) {
      const svg = $(svgId);
      if (!svg) {
        updateFn();
        return;
      }

      window.clearTimeout(animateCenter.timers[svgId]);
      svg.classList.add("center-changing");
      animateCenter.timers[svgId] = window.setTimeout(() => {
        updateFn();
        window.requestAnimationFrame(() => svg.classList.remove("center-changing"));
      }, 90);
    }

    animateCenter.timers = {};

    function updateDonutSelection(svgId, selectedIndex) {
      const svg = $(svgId);
      if (!svg) return;

      svg.querySelectorAll(".slice-group").forEach((slice) => {
        const active = Number(slice.dataset.index) === selectedIndex;
        slice.classList.toggle("active", active);
        slice.classList.toggle("dim", !active);
      });
    }

    function updateRowSelection(listId, rowSelector, selectedIndex) {
      const list = $(listId);
      if (!list) return;

      list.querySelectorAll(rowSelector).forEach((row) => {
        row.classList.toggle("active", Number(row.dataset.index) === selectedIndex);
      });
    }

    function renderHoldingsChart() {
      const holdings = state.data.holdings;
      const selected = holdings[state.selectedHolding];

      renderDonut(
        "holdingsChart",
        holdings,
        (item) => item.value,
        state.selectedHolding,
        selectHolding,
        (center) => {
          addSvgText(center, selected.ticker, {
            id: "holdingsChartTitle",
            x: "180",
            y: "148",
            fill: "#101511",
            "font-size": "24",
            "font-weight": "840",
            "letter-spacing": "0"
          });
          addSvgText(center, centerLabel(selected.nameZh || selected.name || ""), {
            id: "holdingsChartSubtitle",
            x: "180",
            y: "172",
            fill: "#687066",
            "font-size": "11",
            "font-weight": "500"
          });
          addSvgText(center, formatPct(selected.weight), {
            id: "holdingsChartPct",
            x: "180",
            y: "202",
            fill: "#00a53c",
            "font-size": "23",
            "font-weight": "840",
            "letter-spacing": "0"
          });
          addSvgText(center, formatCurrency(selected.value), {
            id: "holdingsChartValue",
            x: "180",
            y: "226",
            fill: "#687066",
            "font-size": "11",
            "font-weight": "500"
          });
        }
      );
    }

    function renderGainChart() {
      const items = state.data.performance.items;
      const selected = items[state.selectedPerformance];

      renderDonut(
        "gainChart",
        items,
        (item) => Math.abs(item.gain),
        state.selectedPerformance,
        selectPerformance,
        (center) => {
          addSvgText(center, centerLabel(selected.label, 10), {
            id: "gainChartTitle",
            x: "180",
            y: "150",
            fill: "#101511",
            "font-size": "14",
            "font-weight": "760"
          });
          addSvgText(center, formatSignedCurrency(selected.gain), {
            id: "gainChartValue",
            x: "180",
            y: "184",
            fill: selected.gain >= 0 ? "#00a53c" : "#ff5000",
            "font-size": "22",
            "font-weight": "840",
            "letter-spacing": "0"
          });
          addSvgText(center, formatSignedPct(selected.returnPct), {
            id: "gainChartPct",
            x: "180",
            y: "215",
            fill: "#687066",
            "font-size": "13",
            "font-weight": "600"
          });
        }
      );
    }

    function updateHoldingSelection(animate = true) {
      const selected = state.data.holdings[state.selectedHolding];
      updateDonutSelection("holdingsChart", state.selectedHolding, animate);
      updateRowSelection("holdingList", ".holding", state.selectedHolding);

      const updateCenter = () => {
        setSvgText("holdingsChartTitle", selected.ticker);
        setSvgText("holdingsChartSubtitle", centerLabel(selected.nameZh || selected.name || ""));
        setSvgText("holdingsChartPct", formatPct(selected.weight));
        setSvgText("holdingsChartValue", formatCurrency(selected.value));
      };

      if (animate) {
        animateCenter("holdingsChart", updateCenter);
      } else {
        updateCenter();
      }
    }

    function updatePerformanceSelection(animate = true) {
      const selected = state.data.performance.items[state.selectedPerformance];
      updateDonutSelection("gainChart", state.selectedPerformance, animate);
      updateRowSelection("performanceList", ".perf-row", state.selectedPerformance);

      const updateCenter = () => {
        setSvgText("gainChartTitle", centerLabel(selected.label, 10));
        setSvgText("gainChartValue", formatSignedCurrency(selected.gain), {
          fill: selected.gain >= 0 ? "#00a53c" : "#ff5000"
        });
        setSvgText("gainChartPct", formatSignedPct(selected.returnPct));
      };

      if (animate) {
        animateCenter("gainChart", updateCenter);
      } else {
        updateCenter();
      }
    }

    function selectHolding(index) {
      if (state.selectedHolding === index) return;
      state.selectedHolding = index;
      updateHoldingSelection(true);
    }

    function selectPerformance(index) {
      if (state.selectedPerformance === index) return;
      state.selectedPerformance = index;
      updatePerformanceSelection(true);
    }

    function renderHoldingList() {
      const list = $("holdingList");
      list.innerHTML = "";

      state.data.holdings.forEach((item, index) => {
        const accent = state.colors[index % state.colors.length];
        const row = document.createElement("div");
        row.className = `holding ${index === state.selectedHolding ? "active" : ""}`;
        row.dataset.index = String(index);
        row.style.setProperty("--accent", accent);
        row.style.setProperty("--accent-soft", `rgba(${hexToRgb(accent)}, 0.09)`);
        row.innerHTML = `
          <div class="swatch" style="background:${accent}"></div>
          <div class="holding-main">
            <div class="ticker-line">
              <span class="ticker">${escapeHtml(item.ticker)}</span>
              <span class="kind">${escapeHtml(item.type || "持仓")}</span>
            </div>
            <div class="zh">${escapeHtml(item.nameZh || item.name || "")}</div>
          </div>
          <div class="holding-side">
            <div class="pct">${formatPct(item.weight)}</div>
            <div class="val">${formatCurrency(item.value)}</div>
          </div>
        `;

        row.addEventListener("mouseenter", () => selectHolding(index));
        row.addEventListener("click", () => selectHolding(index));

        list.appendChild(row);
      });
    }

    function renderPerformanceList() {
      const list = $("performanceList");
      const items = state.data.performance.items;
      list.innerHTML = "";

      items.forEach((item, index) => {
        const accent = state.colors[index % state.colors.length];
        const row = document.createElement("div");
        row.className = `perf-row ${index === state.selectedPerformance ? "active" : ""}`;
        row.dataset.index = String(index);
        row.style.setProperty("--accent", accent);
        row.style.setProperty("--accent-soft", `rgba(${hexToRgb(accent)}, 0.09)`);
        const gainShare = item.currentValue ? Math.abs(item.gain) / Math.abs(item.currentValue) * 100 : 0;
        const pct = item.gain === 0 ? 0 : Math.max(4, Math.min(100, gainShare));
        row.innerHTML = `
          <div class="perf-row-top">
            <div class="perf-name">${escapeHtml(item.label)}</div>
            <div class="gain ${item.gain < 0 ? "negative" : ""}">${formatSignedCurrency(item.gain)}</div>
          </div>
          <div class="perf-row-bottom">
            <span>本金 ${formatCurrency(item.principal)}</span>
            <span>当前 ${formatCurrency(item.currentValue)} · ${formatSignedPct(item.returnPct)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill ${item.gain < 0 ? "negative" : ""}" style="width:${pct}%; --accent:${accent}"></div></div>
        `;

        row.addEventListener("mouseenter", () => selectPerformance(index));
        row.addEventListener("click", () => selectPerformance(index));

        list.appendChild(row);
      });
    }

    function numericOrNull(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function holdingGain(item) {
      const explicitGain = numericOrNull(item.unrealizedGain);
      if (explicitGain !== null) return explicitGain;

      const value = numericOrNull(item.value);
      const costBasis = numericOrNull(item.costBasis);
      if (value === null || costBasis === null) return null;

      return value - costBasis;
    }

    function holdingReturnPct(item, gain) {
      const explicitPct = numericOrNull(item.unrealizedReturnPct);
      if (explicitPct !== null) return explicitPct;

      const costBasis = numericOrNull(item.costBasis);
      if (!costBasis) return null;

      return gain / costBasis * 100;
    }

    function renderRanking() {
      const list = $("rankList");
      const ranked = [...state.data.holdings]
        .map((item) => {
          const gain = holdingGain(item);
          const returnPct = gain === null ? null : holdingReturnPct(item, gain);
          return { ...item, computedGain: gain, computedReturnPct: returnPct };
        })
        .filter((item) => item.computedGain !== null)
        .sort((a, b) => b.computedGain - a.computedGain);

      list.innerHTML = "";

      if (!ranked.length) {
        const empty = document.createElement("div");
        empty.className = "rank-row";
        empty.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">暂无浮盈明细</div>
            <div class="rank-sub">缺少成本基础数据时不会显示该模块</div>
          </div>
        `;
        list.appendChild(empty);
        return;
      }

      ranked.forEach((item) => {
        const row = document.createElement("div");
        row.className = "rank-row";
        row.innerHTML = `
          <div class="rank-main">
            <div class="rank-title">${escapeHtml(item.ticker)} ${escapeHtml(item.nameZh || "")}</div>
            <div class="rank-sub">成本 ${formatCurrency(item.costBasis)} · 当前 ${formatCurrency(item.value)}</div>
          </div>
          <div class="rank-gain">
            <div class="gain ${item.computedGain < 0 ? "negative" : ""}">${formatSignedCurrency(item.computedGain)}</div>
            <div class="val">${item.computedReturnPct === null ? "–" : formatSignedPct(item.computedReturnPct)}</div>
          </div>
        `;

        list.appendChild(row);
      });
    }

    function renderSummary() {
      const data = state.data;
      const holdings = data.holdings;
      const largest = holdings[0];
      const perf = data.performance;

      $("meta").textContent = `${data.asOf || "latest"} · ${data.currency || "USD"} · CD + 股票 / ETF`;
      $("largestHolding").textContent = `${largest.ticker} ${formatPct(largest.weight)}`;
      $("holdingCount").textContent = `${holdings.length} 个`;

      $("totalGain").textContent = formatSignedCurrency(perf.totalGain);
      $("totalGain").className = `metric-value gain ${perf.totalGain < 0 ? "negative" : ""}`;
      $("totalGainSub").textContent = `本金 ${formatCurrency(perf.totalPrincipal)}，当前 ${formatCurrency(perf.totalCurrentValue)}`;
      $("totalReturn").textContent = formatSignedPct(perf.totalReturnPct);
      $("totalReturn").className = `metric-value gain ${perf.totalReturnPct < 0 ? "negative" : ""}`;
      $("totalCurrent").textContent = formatCurrency(perf.totalCurrentValue);
      $("totalPrincipal").textContent = formatCurrency(perf.totalPrincipal);
      $("gainSourceCount").textContent = `${perf.items.length} 类`;
      $("perfDate").textContent = data.asOf || "latest";
    }

    function switchTab(tab) {
      state.activeTab = tab;
      $("tabs").dataset.active = tab;
      $("holdingsTab").classList.toggle("active", tab === "holdings");
      $("performanceTab").classList.toggle("active", tab === "performance");
      $("holdingsTab").setAttribute("aria-selected", tab === "holdings" ? "true" : "false");
      $("performanceTab").setAttribute("aria-selected", tab === "performance" ? "true" : "false");

      const activePanel = tab === "holdings" ? $("holdingsPanel") : $("performancePanel");
      const inactivePanel = tab === "holdings" ? $("performancePanel") : $("holdingsPanel");
      if (activePanel.classList.contains("active") && activePanel.classList.contains("panel-ready") && !inactivePanel.classList.contains("active")) {
        return;
      }

      inactivePanel.classList.remove("panel-ready", "active");
      activePanel.classList.add("active");
      activePanel.classList.remove("panel-ready");
      window.requestAnimationFrame(() => activePanel.classList.add("panel-ready"));
    }

    function render() {
      renderSummary();
      renderHoldingsChart();
      renderHoldingList();
      renderGainChart();
      renderPerformanceList();
      renderRanking();
      updateHoldingSelection(false);
      updatePerformanceSelection(false);
      switchTab(state.activeTab);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    $("unlockBtn").addEventListener("click", unlock);
    $("refreshBtn").addEventListener("click", refreshData);
    $("lockBtn").addEventListener("click", lockPage);

    $("holdingsTab").addEventListener("click", () => switchTab("holdings"));
    $("performanceTab").addEventListener("click", () => switchTab("performance"));

    $("passwordInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") unlock();
    });

    window.addEventListener("load", () => {
      if (PREVIEW_MODE && EMBEDDED_DATA) {
        activateData(EMBEDDED_DATA);
        showToast("预览模式");
      } else {
        $("passwordInput").focus();
      }
    });
  </script>
</body>
</html>
